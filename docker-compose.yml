services:
  mivia-server:
    # Future public image example for the v0.2.3 registry release.
    # Go module releases use Git tags such as v0.2.3; container image tags are
    # registry tags and may be published as 0.2.3 by the release workflow.
    # To pull instead of building locally, uncomment the image below and remove
    # the build block.
    # image: ghcr.io/mivialabs/go-mivia:0.2.3
    build:
      context: .
      dockerfile: Dockerfile
    image: mivia-server:local
    pull_policy: build
    init: true
    # Default matches the image's non-root mivia user. Local overrides can set
    # MIVIA_CONTAINER_USER=0:0 when bind-mounted project workspaces must be
    # edited across mixed WSL/Windows filesystem ownership boundaries.
    user: "${MIVIA_CONTAINER_USER:-10001:10001}"
    ports:
      - "${MIVIA_HOST_BIND:-127.0.0.1}:${MIVIA_HOST_PORT:-8080}:8080"
    environment:
      MIVIA_CONFIG_PATH: "/app/configs/mivia-server.compose.toml"
      MIVIA_INTERNAL_ADDR: "127.0.0.1:18080"
      MIVIA_PUBLIC_PORT: "8080"
    volumes:
      # Persistent project graph/search stores are under
      # /var/lib/mivia/projects/<project-id>/.
      # Current releases bound heavy per-project graph/search flushes during ingestion;
      # tune configs/mivia-server.compose.toml full_scan_batch_size as a hard
      # file-count cap when local disks still need smaller write units.
      - mivia-data:/var/lib/mivia
      - ./configs/mivia-server.compose.toml:/app/configs/mivia-server.compose.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6
    restart: unless-stopped

  mivia-automation-runner:
    image: mivia-server:local
    pull_policy: build
    init: true
    entrypoint: ["mivia-runner-entrypoint"]
    # The runner starts as root only to create passwd/group entries for the
    # target UID/GID, then drops privileges before executing work.
    user: "0:0"
    healthcheck:
      disable: true
    command:
      - mivia-automation-runner
      - --server
      - http://mivia-server:8080
      - --watch
      - --poll-interval
      - "${MIVIA_AUTOMATION_RUNNER_POLL_INTERVAL:-5s}"
      - --heartbeat-interval
      - "${MIVIA_AUTOMATION_RUNNER_HEARTBEAT_INTERVAL:-15s}"
      - --codex
      - "${MIVIA_AUTOMATION_CODEX_BINARY:-codex}"
      - --codex-cd
      - "${MIVIA_AUTOMATION_CODEX_CD:-/workspace}"
      - --codex-sandbox
      - "${MIVIA_AUTOMATION_CODEX_SANDBOX:-workspace-write}"
      - "--codex-bypass-approvals-and-sandbox=${MIVIA_AUTOMATION_CODEX_BYPASS:-false}"
    environment:
      MIVIA_RUNTIME_UID: "${MIVIA_AUTOMATION_UID:-10001}"
      MIVIA_RUNTIME_GID: "${MIVIA_AUTOMATION_GID:-10001}"
      MIVIA_RUNTIME_HOME: "${MIVIA_AUTOMATION_HOME:-/home/mivia}"
    volumes:
      - mivia-data:/var/lib/mivia
      # Mount a project workspace to /workspace and Codex auth to the runner
      # user's CODEX_HOME in an ignored local override when the runner should
      # execute real Codex CLI work from a container.
    depends_on:
      mivia-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mivia-data:

# Local override example. Copy this into ignored `.docker-compose.local.yml`
# when you need the container to load an ignored local TOML config, credential
# file, and project roots. Keep real paths and credentials out of committed
# files.
#
# services:
#   mivia-server:
#     # Use 0:0 only for local edit-capable bind mounts. The server preserves
#     # original file ownership on Unix filesystems when atomic edits replace
#     # files, and tolerates chmod-unsupported Windows bind mounts.
#     user: "${MIVIA_CONTAINER_USER:-0:0}"
#     environment:
#       MIVIA_CONFIG_PATH: /app/configs/mivia-server.local.toml
#     volumes:
#       - ./configs/mivia-server.local.toml:/app/configs/mivia-server.local.toml:ro
#       - ./secrets/example-credentials.json:/app/secrets/example-credentials.json:ro
#       - /home/example/projects/service-a:/home/example/projects/service-a
#       - /home/example/projects/service-b:/home/example/projects/service-b
#   mivia-automation-runner:
#     # Match the host user that owns the writable checkout. The helper
#     # scripts/mivia-compose-up infers this automatically.
#     # Any additional runner service in a local override must also disable the
#     # image healthcheck; runners do not expose the server's internal readyz
#     # endpoint.
#     healthcheck:
#       disable: true
#     environment:
#       MIVIA_RUNTIME_UID: "${MIVIA_AUTOMATION_UID:-1000}"
#       MIVIA_RUNTIME_GID: "${MIVIA_AUTOMATION_GID:-1000}"
#       MIVIA_RUNTIME_HOME: /home/example
