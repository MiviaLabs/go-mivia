services:
  mivia-server:
    # Future public image example for the first registry release.
    # Go module releases use Git tags such as v0.1.0; container image tags are
    # registry tags and may be published as 0.1.0 by the release workflow.
    # To pull instead of building locally, uncomment the image below and remove
    # the build block.
    # image: ghcr.io/mivialabs/go-mivia:0.1.0
    build:
      context: .
      dockerfile: Dockerfile
    image: mivia-server:local
    init: true
    ports:
      - "${MIVIA_HOST_BIND:-127.0.0.1}:${MIVIA_HOST_PORT:-8080}:8080"
    environment:
      MIVIA_INTERNAL_ADDR: "127.0.0.1:18080"
      MIVIA_PUBLIC_PORT: "8080"
      MIVIA_LADYBUG_PATH: "${MIVIA_LADYBUG_PATH:-/var/lib/mivia/mivialabs.lbug}"
      MIVIA_SQLITE_PATH: "${MIVIA_SQLITE_PATH:-/var/lib/mivia/mivialabs-config.sqlite}"
      MIVIA_SQLITE_WAL_ENABLED: "${MIVIA_SQLITE_WAL_ENABLED:-true}"
      MIVIA_INGESTION_CONTENT_GRAPH_ENABLED: "${MIVIA_INGESTION_CONTENT_GRAPH_ENABLED:-true}"
      MIVIA_INGESTION_LIVE_UPDATES_ENABLED: "${MIVIA_INGESTION_LIVE_UPDATES_ENABLED:-false}"
      MIVIA_WORKSPACE_ENABLED: "${MIVIA_WORKSPACE_ENABLED:-true}"
    volumes:
      - mivia-data:/var/lib/mivia
      - ./configs:/app/configs:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6
    restart: unless-stopped

volumes:
  mivia-data:
