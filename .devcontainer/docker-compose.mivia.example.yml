# Example Dev Container Compose override for a consuming project.
#
# Copy this into the consuming repository's `.devcontainer/` directory, add it
# to `devcontainer.json` `dockerComposeFile`, and adjust the project volume and
# config path. This assumes the first package-registry release has published:
#
#   ghcr.io/mivialabs/go-mivia:0.2.0
#
# Keep real credentials, local paths, and project allowlists in ignored local
# config files. Do not commit real `.env`, token, or credential files.

services:
  mivia-server:
    image: ghcr.io/mivialabs/go-mivia:0.2.0
    init: true
    pull_policy: missing
    ports:
      - "127.0.0.1:${MIVIA_HOST_PORT:-8080}:8080"
    environment:
      MIVIA_CONFIG_PATH: /app/configs/mivia-server.local.toml
      MIVIA_INTERNAL_ADDR: 127.0.0.1:18080
      MIVIA_PUBLIC_PORT: "8080"
      # Persistent project graph/search stores derive from this parent:
      # /var/lib/mivia/projects/<project-id>/mivialabs.lbug
      # /var/lib/mivia/projects/<project-id>/mivialabs-pebble-search.sqlite
      # v0.2.0 bounds heavy per-project graph/search flushes during ingestion.
      # Keep full_scan_batch_size in the mounted TOML as the hard file-count cap.
      MIVIA_LADYBUG_PATH: /var/lib/mivia/mivialabs.lbug
      MIVIA_SQLITE_PATH: /var/lib/mivia/mivialabs-config.sqlite
      MIVIA_AUTOMATION_RUNNER_EXECUTION: external
      MIVIA_AUTOMATION_CODEX_BINARY_PATH: codex
      MIVIA_AUTOMATION_CODEX_SANDBOX: workspace-write
      MIVIA_AUTOMATION_CODEX_BYPASS: "false"
    volumes:
      - mivia_data:/var/lib/mivia
      # Put the consuming project's Mivia config in an ignored local file.
      - type: bind
        source: ../configs/mivia-server.local.toml
        target: /app/configs/mivia-server.local.toml
        read_only: true
        bind:
          create_host_path: false
      # Mount only project roots that Mivia should be allowed to inspect.
      # Remove `read_only` only when explicitly opting into governed workspace edits.
      - type: bind
        source: ..
        target: /workspaces/example-project
        read_only: true
      # Optional local credentials file for explicitly approved integrations.
      # - ../secrets/atlassian-credentials.json:/app/secrets/atlassian-credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6
    restart: unless-stopped

  mivia-automation-runner:
    image: ghcr.io/mivialabs/go-mivia:0.2.0
    init: true
    entrypoint: []
    pull_policy: missing
    command:
      - mivia-automation-runner
      - --server
      - http://mivia-server:8080
      - --watch
      - --poll-interval
      - "${MIVIA_AUTOMATION_RUNNER_POLL_INTERVAL:-5s}"
      - --codex
      - "${MIVIA_AUTOMATION_CODEX_BINARY:-codex}"
      - --codex-cd
      - "${MIVIA_AUTOMATION_CODEX_CD:-/workspaces/example-project}"
    environment:
      MIVIA_CONFIG_PATH: /app/configs/mivia-server.local.toml
      # Enable these only after the mounted project config opts into
      # [git_operations] and the runner has Codex, SSH, and GitHub auth.
      MIVIA_GIT_OPS_ENABLED: "${MIVIA_GIT_OPS_ENABLED:-false}"
      MIVIA_GIT_OPS_COMMIT_AFTER_TASK: "${MIVIA_GIT_OPS_COMMIT_AFTER_TASK:-true}"
      MIVIA_GIT_OPS_PUSH_AFTER_TASK: "${MIVIA_GIT_OPS_PUSH_AFTER_TASK:-false}"
      MIVIA_GIT_OPS_DRAFT_PR_AFTER_PUSH: "${MIVIA_GIT_OPS_DRAFT_PR_AFTER_PUSH:-false}"
      MIVIA_GIT_OPS_SSH_PRIVATE_KEY_PATH: /run/secrets/mivia_git_ssh_key
      MIVIA_GIT_OPS_SSH_PUBLIC_KEY_PATH: /run/secrets/mivia_git_ssh_key.pub
      MIVIA_GIT_OPS_SSH_KNOWN_HOSTS_PATH: /run/secrets/mivia_known_hosts
      MIVIA_GIT_OPS_GITHUB_TOKEN_ENV: GITHUB_TOKEN
      MIVIA_GIT_AUTHOR_EMAIL: "${MIVIA_GIT_AUTHOR_EMAIL:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    volumes:
      - mivia_data:/var/lib/mivia
      - type: bind
        source: ../configs/mivia-server.local.toml
        target: /app/configs/mivia-server.local.toml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ..
        target: /workspaces/example-project
        read_only: false
      # Mount Codex CLI auth through an ignored local override before enabling
      # real automatic execution in a container.
      # Mount SSH/GitHub auth only into the runner sidecar before enabling push
      # or draft PR creation. Keep host paths in ignored local overrides.
      # - type: bind
      #   source: ~/.ssh/id_rsa
      #   target: /run/secrets/mivia_git_ssh_key
      #   read_only: true
      # - type: bind
      #   source: ~/.ssh/id_rsa.pub
      #   target: /run/secrets/mivia_git_ssh_key.pub
      #   read_only: true
      # - type: bind
      #   source: ~/.ssh/known_hosts
      #   target: /run/secrets/mivia_known_hosts
      #   read_only: true
    depends_on:
      mivia-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mivia_data:
