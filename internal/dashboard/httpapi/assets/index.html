<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mivia Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="title-block">
        <span class="eyebrow">Local control surface</span>
        <h1>Mivia</h1>
        <p id="summary">Loading projects</p>
      </div>
      <div class="actions">
        <button id="back" class="secondary hidden" type="button">&larr; Projects</button>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>
    <main>
      <section id="status" class="status" aria-live="polite"></section>

      <section id="overview">
        <section id="metrics" class="metrics" aria-label="Project summary"></section>
        <div id="list-toolbar" class="toolbar" role="search">
          <label class="search">
            <span class="visually-hidden">Filter projects</span>
            <input id="search" type="search" placeholder="Filter by name, id, or alias" autocomplete="off">
          </label>
          <div id="filters" class="chips" role="group" aria-label="Status filter"></div>
        </div>
        <section id="list" class="card-grid" aria-label="Projects"></section>
      </section>

      <section id="detail" class="detail hidden" aria-label="Project details"></section>
    </main>
  </body>
</html>
