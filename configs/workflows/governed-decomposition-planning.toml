id = "workflow-decomposition-planning"
project_id = "mivialabs-agents-monorepo"
workflow_ref = "governed-decomposition-planning"
title = "Governed Decomposition And Planning"
purpose = "Convert a user objective into a Work Plan with isolated ready Work Tasks, evidence needs, verifier scope, and independent review gates."
status = "enabled"

[[agents]]
id = "planning-worker"
display_name = "Planning Worker"
purpose = "Reads bounded project context and drafts low-intelligence-ready Work Task metadata."
instructions = "Use MCP context health and bounded context refs first. Create metadata-only Work Tasks executable from task fields and attached refs without hidden chat context."
allowed_skills = ["mivia-mcp", "plan-task"]
allowed_tools = [
  "projects.list",
  "projects.get",
  "projects.context_health",
  "projects.context_pack.build",
  "projects.integrations.search",
  "projects.jira.issue.get",
  "projects.work_plans.create",
  "projects.work_tasks.create"
]
allowed_commands = []
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "read_only"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "20m"
max_retries = 1

[[agents]]
id = "planning-reviewer"
display_name = "Planning Reviewer"
purpose = "Reviews Work Plan and Work Task decomposition for readiness, evidence, dependencies, and verifier scope."
instructions = "Reject decomposition that lacks evidence refs, verifier scope, dependencies, resume instructions, review gates, files_to_read, or clear files_to_edit decisions."
allowed_skills = ["mivia-mcp", "project-review"]
allowed_tools = [
  "projects.integrations.search",
  "projects.jira.issue.get",
  "projects.work_plans.get",
  "projects.work_tasks.list",
  "projects.work_tasks.attach_review_result",
  "projects.claims.check"
]
allowed_commands = []
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "read_only"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "15m"
max_retries = 0

[[agents]]
id = "planning-orchestrator"
display_name = "Planning Orchestrator"
purpose = "Compiles planning tasks and queues only reviewed ready tasks for automation."
instructions = "Move tasks to ready or queue automation only after independent review refs, permission snapshots, and safe task packet metadata exist."
allowed_skills = ["mivia-mcp"]
allowed_tools = [
  "projects.integrations.search",
  "projects.jira.issue.get",
  "projects.work_plans.resume",
  "projects.work_tasks.update_status",
  "projects.automations.create",
  "projects.automations.run_parallel_batch"
]
allowed_commands = []
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "read_only"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "10m"
max_retries = 0

[[steps]]
id = "discover-planning-context"
kind = "work_task"
title = "Discover Planning Context"
agent = "planning-worker"
description = "Identify repo instructions, current project state, relevant docs, source areas, and MCP surface gaps for the requested objective."
evidence_needed = ["project-context-health", "repo-instructions-ref", "context-pack-ref", "mcp-surface-gap-ref"]
files_to_read = [
  ".ai/INDEX.md",
  ".ai/rules/00-operating-doctrine.md",
  ".ai/rules/05-external-systems.md",
  ".ai/rules/10-security-privacy.md",
  ".ai/rules/20-go-service-standards.md",
  ".ai/rules/30-docker-data.md",
  ".ai/skills/mivia-mcp/SKILL.md",
  "configs/workflows/governed-decomposition-planning.toml"
]
files_to_edit = []
likely_files_affected = [".ai/INDEX.md", "docs", "internal", "configs"]
verification_requirement = "orchestrator verifies context refs exist before decomposition"
expected_output = "bounded planning context summary and evidence refs"
failure_criteria = "block if context freshness, scope, or MCP availability cannot be established"
review_gate = "planning-readiness-review required before context task is done"
resume_instructions = "resume by reading attached context refs and current Work Plan metadata"
acceptance_criteria = [
  "Context refs include repo instructions, project health, bounded context pack refs, and MCP surface gaps.",
  "Context output is metadata-only and sufficient for isolated decomposition work."
]
stop_conditions = [
  "Stop if repo instructions, context health, or bounded context refs cannot be established.",
  "Stop if decomposition would depend on hidden chat context or unverified source state."
]
verifier_ladder = [
  "orchestrator checks repo instruction refs",
  "orchestrator checks context health refs",
  "orchestrator checks bounded context pack and MCP surface refs"
]
regression_test_applicability = "not_applicable for metadata-only context discovery"
downstream_impact_refs = ["context-pack-ref", "mcp-surface-gap-ref"]
output_contract = "bounded planning context packet with repo instruction refs, context health refs, and MCP surface gap refs"

[[steps]]
id = "map-downstream-impact"
kind = "work_task"
title = "Map Downstream Impact"
agent = "planning-worker"
depends_on = ["discover-planning-context"]
description = "Produce the dependency map and downstream impact refs required before task decomposition."
evidence_needed = ["context-pack-ref", "project-context-health", "mcp-surface-gap-ref"]
files_to_read = [
  ".ai/INDEX.md",
  ".ai/skills/mivia-mcp/SKILL.md",
  "docs/agent-context-guide.md",
  "configs/workflows/governed-decomposition-planning.toml"
]
files_to_edit = []
likely_files_affected = [".ai", "docs", "internal", "configs"]
verification_requirement = "orchestrator verifies dependency-map-ref and downstream-impact-ref exist before decomposition"
expected_output = "metadata-only dependency map and downstream impact refs for decomposition"
failure_criteria = "block if downstream impact cannot be mapped from bounded context refs without hidden chat context"
review_gate = "planning-readiness-review must approve downstream impact refs before decomposition"
resume_instructions = "resume from Work Plan id, context-pack-ref, dependency-map-ref, and downstream-impact-ref"
acceptance_criteria = [
  "Dependency map identifies prerequisite task ordering and affected workflow stages.",
  "Downstream impact refs cover implementation, review, verifier, GitOps, and PR creation handoffs.",
  "Output is metadata-only and sufficient for isolated decomposition work."
]
stop_conditions = [
  "Block if dependency or downstream impact refs are missing or unverifiable.",
  "Stop if impact mapping depends on hidden chat context or unsafe unbounded payload material."
]
verifier_ladder = [
  "orchestrator checks dependency-map-ref exists",
  "orchestrator checks downstream-impact-ref exists",
  "orchestrator verifies decompose-work-plan depends on this reviewed task"
]
regression_test_applicability = "not_applicable for metadata-only downstream impact mapping"
downstream_impact_refs = ["dependency-map-ref", "downstream-impact-ref"]
output_contract = "dependency map and downstream impact refs available before decomposition"

[[steps]]
id = "decompose-work-plan"
kind = "work_task"
title = "Decompose Work Plan"
agent = "planning-worker"
depends_on = ["map-downstream-impact"]
description = "Create small Work Tasks with objective, files, evidence, dependencies, verifier, output, failure criteria, resume instructions, and review gate."
evidence_needed = ["context-pack-ref", "dependency-map-ref", "downstream-impact-ref"]
files_to_read = [
  ".ai/INDEX.md",
  ".ai/skills/mivia-mcp/SKILL.md",
  "docs/agent-context-guide.md",
  "configs/workflows/governed-decomposition-planning.toml"
]
files_to_edit = []
likely_files_affected = [".ai", "docs", "internal", "configs"]
verification_requirement = "orchestrator checks every task is low-intelligence-ready before ready status"
expected_output = "Work Tasks in planned status with complete metadata"
failure_criteria = "block if any task depends on hidden chat context or lacks review and verifier requirements"
review_gate = "planning-readiness-review must approve task packets before ready status"
resume_instructions = "resume from Work Plan id, task refs, dependency map, and evidence refs"
acceptance_criteria = [
  "Each child Work Task has one objective, bounded scope, dependencies, evidence needs, review gate, verifier requirement, and resume instructions.",
  "Each child Work Task can be executed by an isolated worker from task metadata and attached refs only."
]
stop_conditions = [
  "Block instead of creating tasks when scope, evidence, dependencies, or verifier requirements are missing.",
  "Do not mark child tasks ready until independent planning review approves the task packets."
]
verifier_ladder = [
  "orchestrator reviews child task metadata completeness",
  "orchestrator verifies dependency and downstream-impact refs",
  "orchestrator checks review gate and verifier requirements before ready status"
]
regression_test_applicability = "required when decomposition identifies code-impacting work; otherwise record a concrete not-applicable reason"
downstream_impact_refs = ["dependency-map-ref", "downstream-impact-ref"]
output_contract = "planned child Work Tasks with complete governance metadata and no hidden chat context"
max_parallel_tasks = 1

[[steps]]
id = "mark-ready-after-review"
kind = "work_task"
title = "Mark Tasks Ready After Review"
agent = "planning-orchestrator"
depends_on = ["decompose-work-plan"]
description = "Move only reviewed decomposition-complete tasks from planned to ready and leave incomplete tasks blocked."
evidence_needed = ["review-result-ref", "ready-task-list-ref"]
files_to_read = ["configs/workflows/governed-decomposition-planning.toml"]
files_to_edit = []
likely_files_affected = []
verification_requirement = "orchestrator confirms review refs before ready status"
expected_output = "ready task refs or blocked task refs with resume instructions"
failure_criteria = "block if any task lacks independent review or required metadata"
review_gate = "planning-readiness-review required before status changes"
resume_instructions = "resume by listing task statuses and checking attached review refs"
acceptance_criteria = [
  "Only independently reviewed decomposition-complete tasks are moved to ready.",
  "Incomplete tasks remain planned or blocked with concrete resume instructions."
]
stop_conditions = [
  "Stop if any task lacks review refs, verifier requirements, dependencies, or resume instructions.",
  "Stop if child implementation tasks are missing or still depend on hidden context."
]
verifier_ladder = [
  "orchestrator lists planned child tasks",
  "orchestrator checks review refs and verifier requirements",
  "orchestrator moves only complete reviewed tasks to ready"
]
regression_test_applicability = "not_applicable for metadata-only readiness transition"
downstream_impact_refs = ["ready-task-list-ref", "review-result-ref"]
output_contract = "ready task refs or blocked task refs with exact missing metadata and resume instructions"

[[steps]]
id = "queue-planning-automation"
kind = "automation_batch"
title = "Queue Planning Automation"
agent = "planning-orchestrator"
depends_on = ["mark-ready-after-review"]
description = "Queue reviewed planning tasks only after decomposition and review gates have passed."
evidence_needed = ["automation-ref", "permission-snapshot-ref", "ready-task-list-ref"]
files_to_read = ["configs/workflows/governed-decomposition-planning.toml"]
files_to_edit = []
likely_files_affected = []
verification_requirement = "orchestrator verifies automation refs and no worker-run full tests"
expected_output = "automation batch queued for ready planning tasks"
failure_criteria = "block if ready tasks overlap unsafely or lack permission snapshots"
review_gate = "planning-readiness-review required before automation queueing"
resume_instructions = "resume from automation run refs and task statuses"
acceptance_criteria = [
  "Automation refs are queued only for reviewed ready planning tasks.",
  "Permission snapshot refs and task status refs are attached for every queued automation."
]
stop_conditions = [
  "Stop if any task lacks ready status, permission snapshots, or safe non-overlapping scope.",
  "Stop if automation queueing would run unreviewed or incomplete planning tasks."
]
verifier_ladder = [
  "orchestrator checks ready task refs",
  "orchestrator checks permission snapshot refs",
  "orchestrator checks queued automation refs and task statuses"
]
regression_test_applicability = "not_applicable for metadata-only automation queueing"
downstream_impact_refs = ["automation-ref", "permission-snapshot-ref", "ready-task-list-ref"]
output_contract = "automation batch refs for reviewed ready planning tasks with permission snapshot refs"
max_parallel_tasks = 2

[[review_gates]]
id = "planning-readiness-review"
applies_to = ["discover-planning-context", "map-downstream-impact", "decompose-work-plan", "mark-ready-after-review", "queue-planning-automation"]
reviewer_agent = "planning-reviewer"
required = true
independent_from_owner = true
required_artifacts = ["work-plan-ref", "work-task-refs", "evidence-refs", "dependency-map-ref", "downstream-impact-ref"]
allowed_actions = ["approved", "rejected", "needs_changes", "blocked"]
instructions = "Approve only if each Work Task is isolated-worker-ready, metadata-only, has evidence needs, verifier scope, dependencies, resume instructions, and independent review requirements."
