id = "workflow-code-review-bug-planning"
project_id = "mivialabs-agents-monorepo"
workflow_ref = "governed-code-review-bug-planning"
title = "Governed Automatic Code Review Bug Planning"
purpose = "Run automatic governed code review over a bounded ref or diff, confirm only evidence-backed bugs through independent review, and create governed bug Work Plans for confirmed findings."
status = "enabled"

[[agents]]
id = "code-review-scanner"
display_name = "Code Review Scanner"
purpose = "Inspects bounded changed files, source anchors, tests, and docs to propose candidate defects with evidence refs only."
allowed_skills = ["mivia-mcp", "mivialabs-code-review"]
allowed_tools = [
  "projects.get",
  "projects.context_health",
  "projects.workspace.git_status",
  "projects.workspace.git_diff",
  "projects.workspace.file_read",
  "projects.context_pack.build",
  "projects.evidence_graph.claims.create",
  "projects.evidence_graph.evidence.append",
  "projects.work_tasks.attach_evidence",
  "projects.work_tasks.attach_claim"
]
allowed_commands = ["git diff --check"]
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "read_only"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "30m"
max_retries = 1

[[agents]]
id = "bug-finding-reviewer"
display_name = "Bug Finding Reviewer"
purpose = "Independently validates or rejects candidate findings using source anchors and safe evidence refs."
allowed_skills = ["mivia-mcp", "mivialabs-code-review"]
allowed_tools = [
  "projects.workspace.file_read",
  "projects.context_pack.build",
  "projects.claims.check",
  "projects.work_tasks.attach_review_result"
]
allowed_commands = []
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "read_only"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "20m"
max_retries = 0

[[agents]]
id = "bug-plan-orchestrator"
display_name = "Bug Plan Orchestrator"
purpose = "Deduplicates confirmed bugs and creates one governed bug-fix Work Plan with isolated tasks for each confirmed finding."
allowed_skills = ["mivia-mcp", "plan-task"]
allowed_tools = [
  "projects.work_plans.create",
  "projects.work_tasks.create",
  "projects.work_tasks.update_status",
  "projects.work_tasks.attach_evidence",
  "projects.work_tasks.attach_claim",
  "projects.work_tasks.attach_review_result",
  "projects.automations.create"
]
allowed_commands = []
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "read_only"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "25m"
max_retries = 0

[[steps]]
id = "collect-review-scope"
kind = "work_task"
title = "Collect Review Scope"
agent = "code-review-scanner"
description = "Collect bounded review scope for a manual code review run, including git status/diff refs, changed-file refs, context health, relevant source anchors, and test/doc context."
evidence_needed = ["review-request-ref", "git-status-ref", "git-diff-ref", "context-health-ref", "changed-file-refs"]
likely_files_affected = []
verification_requirement = "orchestrator confirms review scope refs exist and only bounded metadata refs are stored"
expected_output = "bounded review scope refs and source-anchor refs"
failure_criteria = "block if review scope is missing, too broad, stale, or would require storing unbounded review material"
resume_instructions = "resume by reading review-request-ref, git-status-ref, git-diff-ref, context-health-ref, and changed-file refs"

[[steps]]
id = "scan-for-candidate-bugs"
kind = "work_task"
title = "Scan For Candidate Bugs"
agent = "code-review-scanner"
depends_on = ["collect-review-scope"]
description = "Review bounded changed files for concrete behavioral defects only. Candidate findings must include evidence refs, file/symbol anchors, impact summary, repro or reasoning, and falsification notes."
evidence_needed = ["review-scope-ref", "source-anchor-refs", "candidate-finding-refs", "falsification-notes-ref"]
likely_files_affected = []
verification_requirement = "orchestrator confirms every candidate has source anchors, impact, and falsification notes"
expected_output = "candidate finding refs or no-confirmed-candidate note"
failure_criteria = "block or reject speculative style issues, weak risks, missing anchors, or findings without falsification"
resume_instructions = "resume by reading candidate finding refs, source anchors, and falsification notes"
max_parallel_tasks = 1

[[steps]]
id = "auto-collect-review-scope"
kind = "automation"
title = "Auto Collect Review Scope"
agent = "code-review-scanner"
depends_on = ["collect-review-scope"]
description = "Automatically run the bounded review-scope collection task when it is ready."
evidence_needed = ["automation-ref", "permission-snapshot-ref", "review-request-ref"]
verification_requirement = "executor may queue only the collect-review-scope task when it is ready"
expected_output = "queued automatic review-scope run"
failure_criteria = "block if review scope task is not ready or lacks permission snapshot metadata"
resume_instructions = "resume from automation run refs and collect-review-scope task status"
automation_status = "enabled"
trigger_kind = "automatic"
schedule_policy = "on-ready-task"

[[steps]]
id = "auto-scan-for-candidate-bugs"
kind = "automation"
title = "Auto Scan For Candidate Bugs"
agent = "code-review-scanner"
depends_on = ["scan-for-candidate-bugs"]
description = "Automatically run the candidate bug scan after review-scope collection is complete."
evidence_needed = ["automation-ref", "permission-snapshot-ref", "review-scope-ref"]
verification_requirement = "executor may queue only the scan-for-candidate-bugs task when dependencies are complete"
expected_output = "queued automatic candidate scan run"
failure_criteria = "block if scan task is not ready, dependencies are incomplete, or scope refs are missing"
resume_instructions = "resume from automation run refs and scan-for-candidate-bugs task status"
automation_status = "enabled"
trigger_kind = "automatic"
schedule_policy = "on-ready-task"

[[steps]]
id = "review-candidate-bugs"
kind = "work_task"
title = "Review Candidate Bugs"
agent = "bug-finding-reviewer"
depends_on = ["scan-for-candidate-bugs"]
description = "Independently review each candidate defect. Confirm only bugs that survive direct source falsification and have bounded evidence refs."
evidence_needed = ["candidate-finding-refs", "source-anchor-refs", "review-result-ref", "rejected-finding-refs"]
likely_files_affected = []
verification_requirement = "attach review_result_ref with approved, rejected, needs_changes, or blocked status for each candidate"
expected_output = "confirmed-bug refs and rejected-finding refs"
failure_criteria = "block on self-review, missing source anchors, missing impact, duplicated finding, or unclear decision"
resume_instructions = "resume by reading candidate finding refs and independently checking source anchors before attaching review refs"

[[steps]]
id = "auto-review-candidate-bugs"
kind = "automation"
title = "Auto Review Candidate Bugs"
agent = "bug-finding-reviewer"
depends_on = ["review-candidate-bugs"]
description = "Automatically run independent candidate finding review after candidate scan completes."
evidence_needed = ["automation-ref", "permission-snapshot-ref", "candidate-finding-refs"]
verification_requirement = "executor may queue only the review-candidate-bugs task when dependencies are complete"
expected_output = "queued automatic candidate review run"
failure_criteria = "block on self-review, missing candidate refs, or incomplete dependencies"
resume_instructions = "resume from automation run refs and review-candidate-bugs task status"
automation_status = "enabled"
trigger_kind = "automatic"
schedule_policy = "on-ready-task"

[[steps]]
id = "create-confirmed-bug-work-plans"
kind = "work_task"
title = "Create Confirmed Bug Work Plans"
agent = "bug-plan-orchestrator"
depends_on = ["review-candidate-bugs"]
description = "Create one governed Work Plan per confirmed bug and decompose it into isolated bug-fix Work Tasks: reproduce or anchor evidence, implement fix, add regression test, independent review, and orchestrator verification."
evidence_needed = ["confirmed-bug-refs", "dedupe-key-refs", "review-result-ref", "bug-work-plan-refs"]
likely_files_affected = []
verification_requirement = "orchestrator confirms every created bug Work Plan has isolated tasks, verifier requirements, review gates, dependencies, and resume instructions"
expected_output = "bug Work Plan refs with ready or planned Work Task refs"
failure_criteria = "block if finding is not independently confirmed, duplicates an existing bug plan, lacks evidence refs, or cannot be decomposed without hidden context"
resume_instructions = "resume by listing confirmed-bug refs, dedupe-key refs, created Work Plan refs, and task readiness states"

[[steps]]
id = "auto-create-confirmed-bug-work-plans"
kind = "automation"
title = "Auto Create Confirmed Bug Work Plans"
agent = "bug-plan-orchestrator"
depends_on = ["create-confirmed-bug-work-plans"]
description = "Automatically create governed bug Work Plans after candidate bugs have independent confirmation."
evidence_needed = ["automation-ref", "permission-snapshot-ref", "confirmed-bug-refs", "review-result-ref"]
verification_requirement = "executor may queue only the create-confirmed-bug-work-plans task when confirmed bug review refs exist"
expected_output = "queued automatic bug Work Plan creation run"
failure_criteria = "block if no independently confirmed bug refs exist or dependencies are incomplete"
resume_instructions = "resume from automation run refs, confirmed-bug refs, and created bug Work Plan refs"
automation_status = "enabled"
trigger_kind = "automatic"
schedule_policy = "on-confirmed-bug"

[[steps]]
id = "queue-low-risk-bug-plan-automation"
kind = "automation"
title = "Queue Low Risk Bug Plan Automation"
agent = "bug-plan-orchestrator"
depends_on = ["create-confirmed-bug-work-plans"]
description = "Optionally create automation metadata for confirmed bug Work Plans only. Manual mode leaves implementation unqueued unless the orchestrator explicitly runs automation."
evidence_needed = ["bug-work-plan-refs", "permission-snapshot-ref", "automation-ref", "human-approval-or-manual-run-ref"]
likely_files_affected = []
verification_requirement = "orchestrator confirms automation is metadata-only and targets existing ready Work Tasks only"
expected_output = "automation ref or explicit manual-not-queued note"
failure_criteria = "block if automation would run without confirmed findings, ready tasks, independent review refs, or explicit manual run decision"
resume_instructions = "resume from bug Work Plan refs, automation ref, and manual run decision"

[[review_gates]]
id = "scanner-automation-review"
applies_to = ["auto-collect-review-scope", "auto-scan-for-candidate-bugs"]
reviewer_agent = "bug-finding-reviewer"
required = true
independent_from_owner = true
required_artifacts = ["review-request-ref", "review-scope-ref", "automation-ref", "permission-snapshot-ref"]
allowed_actions = ["approved", "rejected", "needs_changes", "blocked"]
instructions = "Approve only automatic scanner runs over bounded review metadata with safe evidence refs and no unsafe payloads, secrets, roots, or PII."

[[review_gates]]
id = "candidate-review-automation-review"
applies_to = ["auto-review-candidate-bugs"]
reviewer_agent = "bug-plan-orchestrator"
required = true
independent_from_owner = true
required_artifacts = ["candidate-finding-refs", "source-anchor-refs", "automation-ref", "permission-snapshot-ref"]
allowed_actions = ["approved", "rejected", "needs_changes", "blocked"]
instructions = "Approve only automatic candidate review runs that are independent from the scanner and preserve bounded evidence refs."

[[review_gates]]
id = "confirmed-bug-independent-review"
applies_to = ["create-confirmed-bug-work-plans", "auto-create-confirmed-bug-work-plans", "queue-low-risk-bug-plan-automation"]
reviewer_agent = "bug-finding-reviewer"
required = true
independent_from_owner = true
required_artifacts = ["candidate-finding-refs", "source-anchor-refs", "review-result-ref", "confirmed-bug-refs", "dedupe-key-refs"]
allowed_actions = ["approved", "rejected", "needs_changes", "blocked"]
instructions = "Approve only evidence-backed bugs that survive direct source falsification. Reject speculative risks, style-only issues, missing anchors, duplicate findings, self-review, or any plan that would auto-implement without confirmed bug refs and explicit automatic run decision."
