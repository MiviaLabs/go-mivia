id = "workflow-workplan-implementation"
project_id = "mivialabs-agents-monorepo"
workflow_ref = "governed-workplan-implementation"
title = "Governed Work Plan Implementation"
purpose = "Execute reviewed ready Work Tasks from a Work Plan through bounded workers, independent review, orchestrator verification, and metadata-only automation."
status = "enabled"

[[agents]]
id = "implementation-worker"
display_name = "Implementation Worker"
purpose = "Implements one ready Work Task from metadata and attached refs only."
allowed_skills = ["mivia-mcp", "write-tests"]
allowed_tools = [
  "projects.context_pack.build",
  "projects.workspace.file_read",
  "projects.workspace.file_edit",
  "projects.work_tasks.claim",
  "projects.work_tasks.start",
  "projects.work_tasks.attach_evidence",
  "projects.work_tasks.attach_claim"
]
allowed_commands = ["go test ./internal/projectworkflow/...", "go test ./internal/projectautomation/...", "git diff --check"]
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "edit"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "30m"
max_retries = 1

[[agents]]
id = "implementation-reviewer"
display_name = "Implementation Reviewer"
purpose = "Independently reviews changed files, evidence, verifier refs, and task outcome before completion."
allowed_skills = ["mivia-mcp", "mivialabs-code-review"]
allowed_tools = [
  "projects.workspace.git_status",
  "projects.workspace.file_read",
  "projects.work_tasks.attach_review_result",
  "projects.claims.check"
]
allowed_commands = ["git diff --check"]
denied_commands = ["go test ./...", "git push", "git reset --hard"]
workspace_mode = "read_only"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "20m"
max_retries = 0

[[agents]]
id = "implementation-orchestrator"
display_name = "Implementation Orchestrator"
purpose = "Owns task dispatch, focused verification, final broad tests, and completion gates."
allowed_skills = ["mivia-mcp", "write-tests"]
allowed_tools = [
  "projects.work_tasks.get_next",
  "projects.work_tasks.update_status",
  "projects.work_tasks.attach_verifier_result",
  "projects.automations.create",
  "projects.automations.run_parallel_batch"
]
allowed_commands = ["go test ./internal/projectworkflow/...", "go test ./internal/projectautomation/...", "go test ./...", "git diff --check"]
denied_commands = ["git push", "git reset --hard"]
workspace_mode = "edit"
network_policy = "local_only"
secret_policy = "deny"
log_policy = "metadata_only"
max_runtime = "45m"
max_retries = 0

[[steps]]
id = "select-ready-tasks"
kind = "work_task"
title = "Select Ready Tasks"
agent = "implementation-orchestrator"
description = "Select reviewed ready Work Tasks with done dependencies and disjoint likely affected files for the next implementation batch."
evidence_needed = ["ready-task-list-ref", "dependency-status-ref", "review-result-ref"]
likely_files_affected = []
verification_requirement = "orchestrator confirms dependencies and file overlap before dispatch"
expected_output = "safe implementation batch refs or blocked reason"
failure_criteria = "block if tasks are not ready, overlap unsafely, or lack review refs"
resume_instructions = "resume by calling get_next and checking dependency and review refs"

[[steps]]
id = "run-implementation-batch"
kind = "automation_batch"
title = "Run Implementation Batch"
agent = "implementation-worker"
depends_on = ["select-ready-tasks"]
description = "Run bounded implementation workers only for selected ready tasks using permission snapshots and task metadata."
evidence_needed = ["automation-run-ref", "permission-snapshot-ref", "changed-files-ref", "worker-evidence-ref"]
likely_files_affected = ["internal", "cmd", "configs", "docs", ".ai"]
verification_requirement = "workers may run only task-scoped checks; orchestrator runs focused and full tests"
expected_output = "changed files, evidence refs, risks, and tests not run for each task"
failure_criteria = "block if worker uses hidden context, runs full suite, edits out of scope, or lacks evidence"
resume_instructions = "resume from automation run refs, changed files, evidence refs, and task statuses"
max_parallel_tasks = 2

[[steps]]
id = "review-implementation-batch"
kind = "work_task"
title = "Review Implementation Batch"
agent = "implementation-reviewer"
depends_on = ["run-implementation-batch"]
description = "Review each worker result independently before any task can be marked done."
evidence_needed = ["changed-files-ref", "worker-evidence-ref", "verifier-ref", "review-result-ref"]
likely_files_affected = ["internal", "cmd", "configs", "docs", ".ai"]
verification_requirement = "attach review_result_ref for every implementation task"
expected_output = "approved, rejected, needs_changes, or blocked review decisions"
failure_criteria = "block on self-review, missing evidence, missing verifier, or unreviewed changed file"
resume_instructions = "resume by reading worker outputs, changed files, verifier refs, and review refs"

[[steps]]
id = "orchestrator-verification"
kind = "work_task"
title = "Orchestrator Verification"
agent = "implementation-orchestrator"
depends_on = ["review-implementation-batch"]
description = "Run focused tests first, then broader tests when focused checks pass, and attach verifier refs before completion."
evidence_needed = ["focused-test-ref", "full-test-ref", "diff-check-ref", "review-result-ref"]
likely_files_affected = []
verification_requirement = "run focused tests, then go test ./... if focused tests pass, then git diff --check"
expected_output = "verifier refs attached to reviewed tasks"
failure_criteria = "block if focused tests fail, review is missing, or diff check fails"
resume_instructions = "resume by rerunning failed narrow verifier and checking attached review refs"

[[review_gates]]
id = "implementation-independent-review"
applies_to = ["run-implementation-batch", "orchestrator-verification"]
reviewer_agent = "implementation-reviewer"
required = true
independent_from_owner = true
required_artifacts = ["changed-files-ref", "evidence-refs", "verifier-refs", "risk-notes-ref"]
allowed_actions = ["approved", "rejected", "needs_changes", "blocked"]
instructions = "Approve only after independent review of changed files, evidence refs, verifier refs, risks, and task scope. Reject self-review and any full-suite worker execution."
