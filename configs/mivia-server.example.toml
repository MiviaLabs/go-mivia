# Copy this file to configs/mivia-server.local.toml and replace placeholder paths.
# Local config files are ignored and must not contain secrets, tokens, PII, raw prompts,
# raw source content, provider payloads, or personal data.

version = 1

[server]
http_addr = "127.0.0.1:8080"
# "auto" uses every logical CPU visible to the process. Set a positive integer
# to cap Go runtime CPU scheduling for this process.
cpu_count = "auto"
max_request_bytes = 1048576
request_timeout = "10s"
read_header_timeout = "5s"
shutdown_timeout = "10s"

[storage]
# Persistent project graph/search stores use:
# data/projects/<project-id>/mivialabs.lbug
# data/projects/<project-id>/mivialabs-pebble-search.sqlite
# Agent and research metadata stay separate at the configured Ladybug path plus ".metadata".
ladybug_path = "data/mivialabs.lbug"
sqlite_path = "data/mivialabs-config.sqlite"

[sqlite]
# WAL is enabled for local file-backed SQLite by default. The server opens a
# bounded connection pool and serializes writes so status/search reads remain
# responsive during startup full scans. Set false only for unsupported filesystems.
# The process disables WAL and uses one connection for sqlite_path = ":memory:".
wal_enabled = true
busy_timeout = "5s"
synchronous = "NORMAL"
checkpoint_after_ingestion = true

[debug]
# Diagnostics are opt-in and must stay loopback-only. Do not expose roots, env,
# raw source, prompts, tokens, credentials, provider payloads, or personal data.
enabled = false
pprof_enabled = false
expvar_enabled = false
runtime_metrics_enabled = false

[logging]
# Logs go to stdout by default. File logging is opt-in only.
file_enabled = false
# file_path = "data/mivia-server.log"

[ingestion]
# Disabled scaffold only. ADR-0007 owner approvals are still required before
# any runtime may store source content, source-content hashes, or live state.
content_graph_enabled = false
live_updates_enabled = false
ast_extraction_enabled = true
extractor_cache_enabled = true
debounce_interval = "2s"
# 0 means unlimited source-ingestion coverage. Positive values explicitly cap
# indexed file bytes; max_chunk_bytes only sizes chunks.
max_file_bytes = 0
max_chunk_bytes = 16384
queue_depth = 128
# "auto" follows server.cpu_count. Set positive integers here only when this
# process must be capped below the available CPU count.
worker_count = "auto"
global_worker_count = "auto"
per_project_worker_limit = "auto"
live_path_priority = true
# Hard file-count cap for a prepared full-scan storage flush. Heavy files may
# flush earlier because graph/search writes are also bounded by
# internal row/operation weight to avoid multi-minute per-project stalls.
full_scan_batch_size = 500
max_watched_directory_count = 0
task_warn_after = "30s"
initial_scan_on_start = false
sensitive_marker_policy = "skip_file"

[workspace]
# Disabled by default. Enables only governed local workspace status/diff/read/edit
# surfaces for projects that also opt in with workspace_mode below.
enabled = false

[workflows]
# Disabled by default. Workflow TOML is imported as metadata only and is never
# compiled or executed at startup. Paths are relative examples and must not
# escape upward.
enabled = false
definition_paths = [
  "configs/workflows/governed-decomposition-planning.toml",
  "configs/workflows/governed-workplan-implementation.toml",
  "configs/workflows/governed-code-review-bug-planning.toml",
]

[automation]
# Disabled by default. Runner execution must be explicitly enabled after review.
enabled = false
runner_enabled = false
# managed lets mivia-server own automatic execution in native runtimes.
# Docker Compose and devcontainer examples use external execution with a
# mivia-automation-runner sidecar because the server image does not ship Codex
# credentials. external is also available for any separately supervised runner.
runner_execution = "managed"
require_codex_when_available = true
allow_manual_runner = false
queue_depth = 16
poll_interval = "5s"
# External runner sidecars should send heartbeats more often than the server's
# 90s claim lease. Compose defaults MIVIA_AUTOMATION_RUNNER_HEARTBEAT_INTERVAL to 15s.
global_worker_count = 1
per_project_worker_limit = 1
per_agent_worker_limit = 1
max_parallel_tasks = 1
default_max_runtime = "30m"
# codex_binary_path = "codex"

[automation.work_plan_status_trigger]
# Queues enabled automatic automations for a Work Plan when it enters one of
# these statuses. Keep disabled until workflow review gates are configured.
enabled = false
statuses = ["active"]

[git_operations]
# Disabled by default. When enabled in a supervised automation runner, a
# successful task attempt can commit, optionally push, and optionally create a
# draft GitHub PR before orchestrator verification. Public key paths are for
# validation only; push requires a private key plus known_hosts.
enabled = false
commit_after_task = true
push_after_task = false
draft_pr_after_push = false
require_clean_before_task = true
cleanup_worktree_after_plan_done = true
remote_name = "origin"
branch_prefix = "mivia/"
# Optional RE2 branch policy checked before push/PR. Leave empty to rely on
# branch_prefix only, or set per project when another repository has its own
# branch convention.
branch_name_pattern = ""
commit_author_name = "Mivia Automation"
commit_author_email_env = "MIVIA_GIT_AUTHOR_EMAIL"
# ssh_private_key_path = "/run/secrets/mivia_git_ssh_key"
# ssh_public_key_path = "/run/secrets/mivia_git_ssh_key.pub"
# ssh_known_hosts_path = "/run/secrets/mivia_known_hosts"
# github_token_env = "GITHUB_TOKEN"
github_cli_path = "gh"

[git_operations.conventions]
# All templates use fixed safe placeholders only. Available placeholders:
# project_id, work_plan_id, work_task_id, work_task_ref, work_task_title,
# branch_name, ticket_ref, automation_id, automation_run_id, operator_id,
# review_refs, verifier_refs, test_results, and commit_subject. ticket_ref is
# derived from branch/task metadata such as ABC-123. Commit subjects and PR
# titles must render as Conventional Commits. PR bodies always use the required
# sections: What changed, How verified, Tests.
commit_type = "chore"
commit_scope = ""
commit_summary_template = "complete {{work_task_id}}"
pull_request_title_template = "{{commit_subject}}"
what_changed_template = "Completed automation work task {{work_task_id}} for project {{project_id}}."
how_verified_template = "Project ID: {{project_id}}\nWork Plan ID: {{work_plan_id}}\nWork Task ID: {{work_task_id}}\nAutomation ID: {{automation_id}}\nAutomation Run ID: {{automation_run_id}}\nOperator ID: {{operator_id}}\nReview refs: {{review_refs}}\nVerifier refs: {{verifier_refs}}"
tests_template = "{{test_results}}"

[verification]
# Optional global project verification profile. These commands run in the
# automation worktree after Codex writes changes and before GitOps commits,
# pushes, or creates a draft PR. Keep commands safe, deterministic, and
# repository-local.
bootstrap_commands = []
always_before_pr = []

# Per-project verification may override the global profile.
#
# [projects.verification]
# bootstrap_commands = [
#   "pnpm install --frozen-lockfile --prefer-offline --ignore-scripts",
# ]
# always_before_pr = [
#   "pnpm -s nx affected -t lint --base=origin/main --head=HEAD --parallel=4",
#   "pnpm -s nx affected -t typecheck --base=origin/main --head=HEAD --parallel=4",
#   "test ! -d policies/semgrep/rules || semgrep scan --config policies/semgrep/rules/ --error apps/ libs/ packages/",
# ]
#
# [[projects.verification.generated_artifacts]]
# paths = [
#   "packages/contracts/dist/openapi.json",
#   "packages/contracts/dist/openapi.yaml",
# ]
# command = "pnpm -s nx run contracts:verify-openapi"
# required_before_pr = true

[[projects]]
id = "example-service"
# Optional safe lookup IDs accepted anywhere a project id is accepted. Use this
# for repo/module identities that agents naturally pass, especially when the
# runtime cannot read go.mod from a mounted project root.
aliases = ["github.com/example/example-service"]
display_name = "Example Service"
description = "Synthetic local service used to show the project config schema."
root_path = "/absolute/path/to/project"
enabled = true
classification = "internal"
graph_namespace = "example-service"
graph_storage = "persistent"
digest_mode = "metadata_only"
update_policy = "manual"
workspace_mode = "disabled"
include = [
  "**/*.go",
  "go.mod",
  "go.sum",
  "docs/**",
]
exclude = [
  ".git/**",
  "data/**",
  "secrets/**",
  ".env*",
  "lib-ladybug/**",
]
follow_symlinks = false
# 0 inherits unlimited coverage unless an explicit positive project cap is set.
max_file_bytes = 0
max_chunk_bytes = 16384
sensitive_marker_policy = "skip_file"

# Optional per-project GitOps override. Values inherit from [git_operations]
# first, then replace only the fields set here. This is where repository
# branch, commit, PR title, and PR body conventions belong.
#
# [projects.git_operations]
# branch_prefix = ""
# branch_name_pattern = "^(feat|fix|docs)-ABC-[0-9]+(-[a-z0-9-]+)*$"
#
# [projects.git_operations.conventions]
# commit_type = "docs"
# commit_scope = ""
# commit_summary_template = "complete {{work_task_ref}}"
# pull_request_title_template = "docs({{ticket_ref}}): complete {{work_task_ref}}"
# what_changed_template = "Jira: https://example.atlassian.net/browse/{{ticket_ref}}\n\nCompleted {{work_task_title}} for {{project_id}}."
# how_verified_template = "Agent workflow:\n- plan-task: yes (https://example.atlassian.net/browse/{{ticket_ref}})\n- pr-audit: N/A\n\nProject ID: {{project_id}}\nWork Plan ID: {{work_plan_id}}\nWork Task ID: {{work_task_id}}\nAutomation ID: {{automation_id}}\nAutomation Run ID: {{automation_run_id}}\nOperator ID: {{operator_id}}\nReview refs: {{review_refs}}\nVerifier refs: {{verifier_refs}}"
# tests_template = "{{test_results}}"

# Optional Atlassian Cloud project integrations. Credentials are references only:
# never put raw email addresses, API tokens, passwords, or Basic auth values here.
# Jira and Confluence use separate allowlists because issue projects and docs spaces
# do not have to match. Polling is local and disabled until explicitly enabled.
