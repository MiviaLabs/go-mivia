[[projects]]
id = "disabled-example"
display_name = "Disabled Example"
description = "Disabled placeholder entry for staging a future local project."
root_path = "/absolute/path/to/disabled-project"
enabled = false
classification = "internal"
graph_namespace = "disabled-example"
graph_storage = "persistent"
digest_mode = "metadata_only"
update_policy = "manual"
workspace_mode = "disabled"
