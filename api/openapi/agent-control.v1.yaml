openapi: 3.1.0
info:
  title: MiviaLabs Agent Control API
  version: 0.1.0
  description: Localhost-only bootstrap REST contract for task and research-run metadata.
servers:
  - url: http://127.0.0.1:8080/api/v1
paths:
  /tasks:
    post:
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs:
    post:
      operationId: createResearchRun
      summary: Create research run metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchRunRequest'
      responses:
        '201':
          description: Created research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}:
    get:
      operationId: getResearchRun
      summary: Get research run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs/{id}/sources:
    post:
      operationId: createResearchSource
      summary: Create redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchSourceRequest'
      responses:
        '201':
          description: Created research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}/sources/{source_id}:
    get:
      operationId: getResearchSource
      summary: Get redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: source_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects:
    get:
      operationId: listProjects
      summary: List configured local projects
      responses:
        '200':
          description: Configured local project metadata without root paths
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
  /projects/{id}:
    get:
      operationId: getProject
      summary: Get configured local project metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Project metadata without root path exposure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/digest-runs:
    post:
      operationId: createProjectDigestRun
      summary: Run a manual metadata-only project digest
      description: Stores project/file metadata and metadata fingerprints only; raw source content and file-content hashes are not stored or returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '201':
          description: Created metadata-only project digest run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDigestRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/workspace/git/status:
    get:
      operationId: getProjectWorkspaceGitStatus
      summary: Get governed project git status
      description: Parsed status for globally enabled and per-project opted-in content_graph workspaces. Does not expose roots, raw command lines, or raw stderr.
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: include_untracked
          in: query
          schema:
            type: boolean
            default: true
        - name: path_prefix
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Governed git status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceGitStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/workspace/git/diff:
    get:
      operationId: getProjectWorkspaceGitDiff
      summary: Get governed project git diff
      description: Capped safe diff for opted-in content_graph workspaces. No arbitrary shell, commit, push, checkout, reset, raw patch, roots, command lines, or raw stderr are exposed.
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: scope
          in: query
          schema:
            type: string
            enum: [working_tree, staged, head]
            default: working_tree
        - name: file_id
          in: query
          schema:
            type: string
        - name: relative_path
          in: query
          schema:
            type: string
        - name: path_prefix
          in: query
          schema:
            type: string
        - name: context_lines
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 10
        - name: max_diff_bytes
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 262144
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Governed capped diff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceGitDiff'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/workspace/files/read:
    get:
      operationId: readProjectWorkspaceFile
      summary: Read one current workspace file
      description: Reads one eligible current text file by file_id or relative_path and returns an opaque edit token. Tokens are not content hashes.
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: file_id
          in: query
          schema:
            type: string
        - name: relative_path
          in: query
          schema:
            type: string
        - name: max_bytes
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 262144
      responses:
        '200':
          description: Current eligible file text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceFile'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/workspace/files/edit:
    post:
      operationId: editProjectWorkspaceFile
      summary: Apply token-guarded exact byte-span file edits
      description: Applies ordered non-overlapping exact edits only after a current edit token and old_text spans match. Successful non-dry-run edits queue path ingestion.
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceFileEditRequest'
      responses:
        '200':
          description: Edit result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceFileEditResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/ingestion-runs:
    post:
      operationId: createProjectIngestionRun
      summary: Submit manual content graph ingestion
      description: Queues bounded localhost-only ingestion for an opted-in content_graph project and returns run metadata without waiting for scan completion. Raw DB queries, absolute roots, skipped sensitive content, secrets, PII, raw prompts, and provider payloads are not returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '201':
          description: Created ingestion run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIngestionRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/search-index/rebuild:
    post:
      operationId: rebuildProjectSearchIndex
      summary: Rebuild the local project search index
      description: Queues repair of the local SQLite FTS search index for an opted-in content_graph project by deleting indexed search rows and re-running governed ingestion. Returns queued run metadata without waiting for repair completion; poll the ingestion run status before relying on search results. It does not expose raw database queries, roots, content hashes, skipped sensitive content, raw prompts, provider payloads, or raw SQLite/FTS errors.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '202':
          description: Queued repair ingestion run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIngestionRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/ingestion-runs/latest:
    get:
      operationId: getLatestProjectIngestionRun
      summary: Get latest content graph ingestion run metadata
      description: Returns safe run metadata only. It does not include roots, raw paths, source snippets, sensitive matches, or raw errors.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Latest ingestion run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIngestionRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/ingestion-runs/{run_id}:
    get:
      operationId: getProjectIngestionRun
      summary: Get manual content graph ingestion run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/RunID'
      responses:
        '200':
          description: Ingestion run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIngestionRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/files:
    get:
      operationId: listProjectFiles
      summary: List project ingestion file metadata
      description: Returns bounded file metadata only. Sensitive skips omit relative paths and content hashes. Optional extension filtering is case-insensitive and normalizes to a leading dot.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: status
          in: query
          schema:
            type: string
            enum: [eligible, skipped, absent]
        - name: extension
          in: query
          description: Optional file extension filter, with or without a leading dot. Path separators and whitespace are invalid.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Project files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFileList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/files/{file_id}:
    get:
      operationId: getProjectFile
      summary: Get project ingestion file metadata
      description: Returns bounded metadata for one opaque file id. Sensitive skips omit relative paths, extensions, and content hashes.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/FileID'
      responses:
        '200':
          description: Project file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/files/{file_id}/chunks:
    get:
      operationId: listProjectFileChunks
      summary: List bounded project file chunks
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/FileID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: max_chunk_bytes
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Project file chunks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectChunkList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/files/{file_id}/outline:
    get:
      operationId: getProjectFileOutline
      summary: Get project file outline
      description: Returns file, heading, symbol, and chunk location metadata. Symbol filters can bound large outlines. Chunk text is omitted by default, but eligible stored chunk text can be requested with include_chunk_text and max_chunk_bytes.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/FileID'
        - name: kind
          in: query
          schema:
            type: string
        - name: name_prefix
          in: query
          schema:
            type: string
        - name: symbol_page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: symbol_page_token
          in: query
          schema:
            type: string
        - name: include_chunk_text
          in: query
          schema:
            type: boolean
        - name: max_chunk_bytes
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Project file outline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFileOutline'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols:
    get:
      operationId: listProjectSymbols
      summary: List project symbol metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: kind
          in: query
          schema:
            type: string
        - name: name_prefix
          in: query
          schema:
            type: string
        - name: file_id
          in: query
          schema:
            type: string
        - name: extension
          in: query
          schema:
            type: string
        - name: package
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Project symbols
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/search/text:
    get:
      operationId: searchProjectText
      summary: Search eligible indexed project text
      description: Literal-only bounded search over eligible ContentChunk nodes. Snippets are capped. Skipped, denied, sensitive, absent, unindexed files, roots, content hashes, and raw datastore errors are not returned. Results may be stale until ingestion catches up.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: query
          in: query
          required: true
          schema: {type: string, minLength: 1, maxLength: 256}
        - name: mode
          in: query
          schema: {type: string, enum: [literal]}
        - name: case_sensitive
          in: query
          schema: {type: boolean}
        - name: extension
          in: query
          schema: {type: string}
        - name: path_prefix
          in: query
          schema: {type: string}
        - name: max_snippet_bytes
          in: query
          schema: {type: integer, minimum: 1, maximum: 1024}
        - name: max_matches
          in: query
          schema: {type: integer, minimum: 1, maximum: 100}
      responses:
        '200':
          description: Project text search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTextSearchResultList'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/search/files:
    get:
      operationId: searchProjectFiles
      summary: Search eligible indexed project files
      description: Searches safe project-relative eligible file metadata by path substring. Skipped, denied, sensitive, and absent files are excluded.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: extension
          in: query
          schema: {type: string}
        - name: path_prefix
          in: query
          schema: {type: string}
        - name: path_contains
          in: query
          schema: {type: string}
        - name: case_sensitive
          in: query
          schema: {type: boolean}
      responses:
        '200':
          description: Project file search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFileList'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/search/symbols:
    get:
      operationId: searchProjectSymbols
      summary: Search eligible indexed project symbols
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: kind
          in: query
          schema: {type: string}
        - name: name_prefix
          in: query
          schema: {type: string}
        - name: name_contains
          in: query
          schema: {type: string}
        - name: file_id
          in: query
          schema: {type: string}
        - name: extension
          in: query
          schema: {type: string}
        - name: package
          in: query
          schema: {type: string}
        - name: receiver
          in: query
          schema: {type: string}
        - name: case_sensitive
          in: query
          schema: {type: boolean}
      responses:
        '200':
          description: Project symbol search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolList'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/search/references:
    get:
      operationId: searchProjectReferences
      summary: Search eligible indexed project references
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: name_contains
          in: query
          schema: {type: string}
        - name: target_name_contains
          in: query
          schema: {type: string}
        - name: enclosing_contains
          in: query
          schema: {type: string}
        - name: extension
          in: query
          schema: {type: string}
        - name: path_prefix
          in: query
          schema: {type: string}
        - name: resolution_status
          in: query
          schema: {type: string}
        - name: confidence
          in: query
          schema: {type: string}
        - name: case_sensitive
          in: query
          schema: {type: boolean}
      responses:
        '200':
          description: Project reference search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolReferenceList'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/search/calls:
    get:
      operationId: searchProjectCalls
      summary: Search eligible indexed project calls
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: name_contains
          in: query
          schema: {type: string}
        - name: caller_name_contains
          in: query
          schema: {type: string}
        - name: callee_name_contains
          in: query
          schema: {type: string}
        - name: extension
          in: query
          schema: {type: string}
        - name: path_prefix
          in: query
          schema: {type: string}
        - name: resolution_status
          in: query
          schema: {type: string}
        - name: confidence
          in: query
          schema: {type: string}
        - name: case_sensitive
          in: query
          schema: {type: boolean}
      responses:
        '200':
          description: Project call search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolCallEdgeList'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/search/ast/queries:
    get:
      operationId: listProjectASTQueries
      summary: List eligible indexed project AST query catalog
      description: Returns supported named AST query IDs, languages, capture names, query versions, matching extensions, and safe per-language coverage counts scoped to file_too_large. Raw Tree-sitter query text and raw Tree-sitter query syntax are not exposed. Sensitive, denied, absent, parse-error, and other skipped files are not catalog inputs. Oversized files are represented only as safe coverage gaps through file/ingestion metadata such as skipped_reason=file_too_large, size, and reason counts. Source text, chunks, snippets, content hashes, skipped sensitive text, roots, secrets, PII, raw prompts, provider payloads, and raw parser/SQLite/FTS/Tree-sitter errors are not returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Project AST query catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectASTQueryCatalog'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/search/ast:
    get:
      operationId: searchProjectAST
      summary: Search eligible indexed project AST
      description: Runs a named Tree-sitter structural query over eligible indexed chunks only. The query parameter is a catalog id, not raw Tree-sitter syntax. Sensitive, denied, absent, parse-error, oversized, and other skipped files are unreachable from AST search. Oversized files may appear only as file_too_large coverage counts, file metadata with skipped_reason=file_too_large, and ingestion reason counts. Skipped sensitive content, roots, content hashes, raw parser internals, raw prompts, provider payloads, secrets, PII, and raw datastore errors are not returned.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: language
          in: query
          required: true
            schema: {type: string, enum: [go, python, javascript, jsx, typescript, tsx, csharp, dart]}
        - name: query
          in: query
          required: true
          schema:
            type: string
            enum: [function_declarations, class_declarations, type_declarations, call_expressions, imports, test_functions, assignments, error_handling]
        - name: captures
          in: query
          description: Optional comma-separated capture-name allowlist from the named query.
          schema: {type: string}
        - name: extension
          in: query
          schema: {type: string}
        - name: path_prefix
          in: query
          schema: {type: string}
        - name: max_matches
          in: query
          schema: {type: integer, minimum: 1, maximum: 100}
        - name: max_snippet_bytes
          in: query
          schema: {type: integer, minimum: 1, maximum: 1024}
      responses:
        '200':
          description: Project AST search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectASTSearchResultList'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/symbols/{symbol_id}/source:
    get:
      operationId: getProjectSymbolSource
      summary: Get bounded eligible source text for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - name: max_source_bytes
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Bounded symbol source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolSource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/references:
    get:
      operationId: listProjectSymbolReferences
      summary: List bounded references for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Project symbol references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolReferenceList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/callers:
    get:
      operationId: listProjectSymbolCallers
      summary: List direct caller edges for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Project symbol caller edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolCallEdgeList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/callees:
    get:
      operationId: listProjectSymbolCallees
      summary: List direct callee edges for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Project symbol callee edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolCallEdgeList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/call-graph:
    get:
      operationId: getProjectSymbolCallGraph
      summary: Traverse bounded direct call edges for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - name: direction
          in: query
          schema:
            type: string
            enum: [callers, callees, both]
        - name: max_depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: max_nodes
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Project symbol call graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolCallGraph'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    FileID:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    SymbolID:
      name: symbol_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stable opaque file id; never an absolute path.
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    PageToken:
      name: page_token
      in: query
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    Task:
      type: object
      additionalProperties: false
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchRunRequest:
      type: object
      additionalProperties: false
      required: [task_id, goal_summary]
      properties:
        task_id:
          type: string
          minLength: 1
        goal_summary:
          type: string
          minLength: 1
          maxLength: 500
          description: Redacted goal summary only; raw prompts, source content, PII, and provider payloads are prohibited.
    ResearchRun:
      type: object
      additionalProperties: false
      required: [id, task_id, goal_summary, status, created_at, updated_at]
      properties:
        id:
          type: string
        task_id:
          type: string
        goal_summary:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchSourceRequest:
      type: object
      additionalProperties: false
      required: [artifact_ref, source_type, summary]
      properties:
        artifact_ref:
          type: string
          minLength: 1
          description: URL or artifact reference; sensitive query values are redacted before storage.
        source_type:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
          description: Summary is redacted before storage; raw source content is not accepted.
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    ResearchSource:
      type: object
      additionalProperties: false
      required: [id, research_run_id, artifact_ref, source_type, summary, content_hash, retrieved_at, policy_metadata]
      properties:
        id:
          type: string
        research_run_id:
          type: string
        artifact_ref:
          type: string
        source_type:
          type: string
        summary:
          type: string
        content_hash:
          type: string
        retrieved_at:
          type: string
          format: date-time
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    ProjectList:
      type: object
      additionalProperties: false
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    Project:
      type: object
      additionalProperties: false
      required: [id, display_name, enabled, classification, graph_namespace, graph_storage, digest_mode, update_policy, workspace_mode, validation_status]
      properties:
        id:
          type: string
        display_name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        classification:
          type: string
        graph_namespace:
          type: string
        graph_storage:
          type: string
          enum: [persistent, in_memory]
        digest_mode:
          type: string
          enum: [metadata_only, content_graph]
        update_policy:
          type: string
          enum: [manual, live]
        workspace_mode:
          type: string
          enum: [disabled, read_only, edit]
        validation_status:
          type: string
        validation_error:
          type: string
      description: Project metadata response intentionally omits local root paths, include/exclude patterns, raw source content, and file-content hashes.
    WorkspaceGitStatus:
      type: object
      additionalProperties: false
      required: [project_id, entries, truncated]
      properties:
        project_id:
          type: string
        branch:
          type: string
        head_oid_short:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceGitStatusEntry'
        truncated:
          type: boolean
        next_page_token:
          type: string
    WorkspaceGitStatusEntry:
      type: object
      additionalProperties: false
      required: [relative_path, status]
      properties:
        relative_path:
          type: string
        status:
          type: string
        staged_status:
          type: string
        worktree_status:
          type: string
        renamed_from:
          type: string
    WorkspaceGitDiff:
      type: object
      additionalProperties: false
      required: [project_id, scope, files, diff_truncated]
      properties:
        project_id:
          type: string
        scope:
          type: string
          enum: [working_tree, staged, head]
        files:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceGitDiffFile'
        skipped:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceGitDiffSkip'
        diff_truncated:
          type: boolean
        next_page_token:
          type: string
    WorkspaceGitDiffFile:
      type: object
      additionalProperties: false
      required: [relative_path, status, additions, deletions, diff]
      properties:
        relative_path:
          type: string
        status:
          type: string
        additions:
          type: integer
          minimum: 0
        deletions:
          type: integer
          minimum: 0
        diff:
          type: string
    WorkspaceGitDiffSkip:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        relative_path:
          type: string
        reason:
          type: string
    WorkspaceFile:
      type: object
      additionalProperties: false
      required: [project_id, relative_path, size_bytes, modified_at, text, text_truncated, line_count]
      properties:
        file_id:
          type: string
        project_id:
          type: string
        relative_path:
          type: string
        extension:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        modified_at:
          type: string
          format: date-time
        text:
          type: string
        text_truncated:
          type: boolean
        line_count:
          type: integer
          minimum: 0
        edit_token:
          type: string
          description: Opaque per-process token; not a content hash.
    WorkspaceFileEditRequest:
      type: object
      additionalProperties: false
      required: [edit_token, edits]
      properties:
        file_id:
          type: string
        relative_path:
          type: string
        edit_token:
          type: string
        dry_run:
          type: boolean
        edits:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/WorkspaceExactEdit'
    WorkspaceExactEdit:
      type: object
      additionalProperties: false
      required: [start_byte, end_byte, old_text, new_text]
      properties:
        start_byte:
          type: integer
          minimum: 0
        end_byte:
          type: integer
          minimum: 0
        old_text:
          type: string
        new_text:
          type: string
    WorkspaceFileEditResult:
      type: object
      additionalProperties: false
      required: [applied, file, text_truncated]
      properties:
        applied:
          type: boolean
        file:
          $ref: '#/components/schemas/WorkspaceFile'
        diff_preview:
          type: string
        text_truncated:
          type: boolean
        ingestion_run_id:
          type: string
        new_edit_token:
          type: string
    ProjectDigestRun:
      type: object
      additionalProperties: false
      required: [id, project_id, graph_namespace, status, files_scanned, files_stored, files_skipped, started_at, completed_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        graph_namespace:
          type: string
        status:
          type: string
          enum: [completed, failed]
        files_scanned:
          type: integer
          minimum: 0
        files_stored:
          type: integer
          minimum: 0
        files_skipped:
          type: integer
          minimum: 0
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      description: Digest run metadata only; raw source content and file-content hashes are not stored or returned.
    ProjectIngestionRun:
      type: object
      additionalProperties: false
      required: [id, project_id, trigger, mode, status, files_seen, files_ingested, files_skipped, chunks_stored, symbols_stored, started_at, finished_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        trigger:
          type: string
          enum: [manual, live]
        mode:
          type: string
          enum: [content_graph]
        status:
          type: string
          enum: [pending, running, completed, failed]
        files_seen:
          type: integer
          minimum: 0
        files_ingested:
          type: integer
          minimum: 0
        files_skipped:
          type: integer
          minimum: 0
        chunks_stored:
          type: integer
          minimum: 0
        symbols_stored:
          type: integer
          minimum: 0
        error_category:
          type: string
        reason_counts:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
    ProjectFileList:
      type: object
      additionalProperties: false
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/ProjectFile'
        next_page_token:
          type: string
        index:
          $ref: '#/components/schemas/ProjectSearchIndex'
    ProjectFile:
      type: object
      additionalProperties: false
      required: [id, project_id, status, present, size_bytes, modified_at, relative_path_safe]
      properties:
        id:
          type: string
          description: Stable opaque file id; never an absolute path.
        project_id:
          type: string
        relative_path:
          type: string
          description: Root-relative path for safe eligible files only.
        extension:
          type: string
          description: Lowercase file extension, including leading dot, for safe relative paths only.
        status:
          type: string
          enum: [eligible, skipped, absent]
        present:
          type: boolean
        size_bytes:
          type: integer
          minimum: 0
        modified_at:
          type: string
          format: date-time
        skipped_reason:
          type: string
        relative_path_safe:
          type: boolean
      description: Does not include absolute roots, source-content hashes, skipped sensitive content, or matched sensitive text.
    ProjectChunkList:
      type: object
      additionalProperties: false
      required: [chunks]
      properties:
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/ProjectChunk'
        next_page_token:
          type: string
    ProjectChunk:
      type: object
      additionalProperties: false
      required: [id, file_id, project_id, index, start_line, end_line, byte_start, byte_end, text, text_truncated]
      properties:
        id:
          type: string
        file_id:
          type: string
        project_id:
          type: string
        index:
          type: integer
          minimum: 0
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
        byte_start:
          type: integer
          minimum: 0
        byte_end:
          type: integer
          minimum: 0
        text:
          type: string
          description: Bounded eligible chunk text only; never skipped sensitive content.
        text_truncated:
          type: boolean
    ProjectFileOutline:
      type: object
      additionalProperties: false
      required: [file]
      properties:
        file:
