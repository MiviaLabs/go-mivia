      operationId: listProjectASTQueries
      summary: List eligible indexed project AST query catalog
      description: Returns supported named AST query IDs, languages, capture names, query versions, matching extensions, and safe per-language coverage counts scoped to file_too_large. Raw Tree-sitter query text and raw Tree-sitter query syntax are not exposed. Sensitive, denied, absent, parse-error, and other skipped files are not catalog inputs. Oversized files are represented only as safe coverage gaps through file/ingestion metadata such as skipped_reason=file_too_large, size, and reason counts. Source text, chunks, snippets, content hashes, skipped sensitive text, roots, secrets, PII, raw prompts, provider payloads, and raw parser/SQLite/FTS/Tree-sitter errors are not returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Project AST query catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectASTQueryCatalog'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/search/ast:
    get:
      operationId: searchProjectAST
      summary: Search eligible indexed project AST
      description: Runs a named Tree-sitter structural query over eligible indexed chunks only. The query parameter is a catalog id, not raw Tree-sitter syntax. Dart supports normal structural query ids plus Flutter-specific flutter_widgets and flutter_build_methods. Sensitive, denied, absent, parse-error, oversized, and other skipped files are unreachable from AST search. Oversized files may appear only as file_too_large coverage counts, file metadata with skipped_reason=file_too_large, and ingestion reason counts. Skipped sensitive content, roots, content hashes, raw parser internals, raw prompts, provider payloads, secrets, PII, and raw datastore errors are not returned.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: language
          in: query
          required: true
          schema: {type: string, enum: [go, python, javascript, jsx, typescript, tsx, csharp, dart]}
        - name: query
          in: query
          required: true
          schema:
            type: string
            enum: [function_declarations, class_declarations, type_declarations, call_expressions, imports, test_functions, assignments, error_handling, flutter_widgets, flutter_build_methods]
        - name: captures
          in: query
          description: Optional comma-separated capture-name allowlist from the named query.
          schema: {type: string}
        - name: extension
          in: query
          schema: {type: string}
        - name: path_prefix
          in: query
          schema: {type: string}
        - name: max_matches
          in: query
          schema: {type: integer, minimum: 1, maximum: 100}
        - name: max_snippet_bytes
          in: query
          schema: {type: integer, minimum: 1, maximum: 1024}
      responses:
        '200':
          description: Project AST search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectASTSearchResultList'
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
  /projects/{id}/symbols/{symbol_id}/source:
    get:
      operationId: getProjectSymbolSource
      summary: Get bounded eligible source text for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - name: max_source_bytes
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Bounded symbol source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolSource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/references:
    get:
      operationId: listProjectSymbolReferences
      summary: List bounded references for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Project symbol references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolReferenceList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/callers:
    get:
      operationId: listProjectSymbolCallers
      summary: List direct caller edges for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Project symbol caller edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolCallEdgeList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/callees:
    get:
      operationId: listProjectSymbolCallees
      summary: List direct callee edges for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Project symbol callee edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolCallEdgeList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols/{symbol_id}/call-graph:
    get:
      operationId: getProjectSymbolCallGraph
      summary: Traverse bounded direct call edges for a project symbol
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/SymbolID'
        - name: direction
          in: query
          schema:
            type: string
            enum: [callers, callees, both]
        - name: max_depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: max_nodes
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Project symbol call graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolCallGraph'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations:
    get:
      operationId: listProjectIntegrations
      summary: List configured project integrations
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Configured integration providers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationProviderList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations/{provider}/status:
    get:
      operationId: getProjectIntegrationStatus
      summary: Get local integration status
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/IntegrationProvider'
      responses:
        '200':
          description: Local integration status and redacted ingestion metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations/counts:
    get:
      operationId: countProjectIntegrationItems
      summary: Count locally ingested integration items
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Local integration item counts by provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationCounts'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations/search:
    get:
      operationId: searchProjectIntegrationContent
      summary: Search locally ingested integration content
      description: Searches locally persisted integration content only. Result snippets are bounded by query parameters and server limits.
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: provider
          in: query
          schema:
            $ref: '#/components/schemas/IntegrationProvider'
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: max_results
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: max_snippet_bytes
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 4096
        - name: case_sensitive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Bounded local integration content matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationSearchResults'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations/jira/issues:
    get:
      operationId: listProjectJiraIssues
      summary: List locally ingested Jira issues
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: sort
          in: query
          schema:
            type: string
            enum: [updated_desc, updated_asc, key_asc]
      responses:
        '200':
          description: Jira issues sorted by most recently updated by default
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationItemPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations/jira/issues/{key}:
    get:
      operationId: getProjectJiraIssueContent
      summary: Get bounded local Jira issue content
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: key
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - $ref: '#/components/parameters/IntegrationMaxChunks'
        - $ref: '#/components/parameters/IntegrationMaxChunkBytes'
        - $ref: '#/components/parameters/IntegrationChunkOffset'
      responses:
        '200':
          description: Bounded local Jira issue content chunks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationContentRead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations/confluence/pages:
    get:
      operationId: listProjectConfluencePages
      summary: List locally ingested Confluence pages
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: sort
          in: query
          schema:
            type: string
            enum: [updated_desc, updated_asc, key_asc]
      responses:
        '200':
          description: Confluence pages sorted by most recently updated by default
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationItemPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/integrations/confluence/pages/{page_id}:
    get:
      operationId: getProjectConfluencePageContent
      summary: Get bounded local Confluence page content
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: page_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - $ref: '#/components/parameters/IntegrationMaxChunks'
        - $ref: '#/components/parameters/IntegrationMaxChunkBytes'
        - $ref: '#/components/parameters/IntegrationChunkOffset'
      responses:
        '200':
          description: Bounded local Confluence page content chunks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIntegrationContentRead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    FileID:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    SymbolID:
      name: symbol_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stable opaque file id; never an absolute path.
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    PageToken:
      name: page_token
      in: query
      schema:
        type: string
    PlanID:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
    TaskID:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
    PlanIDQuery:
      name: plan_id
      in: query
      schema:
        type: string
        maxLength: 200
    OwnerAgentQuery:
      name: owner_agent
      in: query
      schema:
        type: string
        maxLength: 120
    ClaimedByRunIDQuery:
      name: claimed_by_run_id
      in: query
      description: The implementation also accepts run_id as an alias for this filter.
      schema:
        type: string
        maxLength: 200
    WorkPlanStatusQuery:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/ProjectWorkPlanStatus'
    WorkTaskStatusQuery:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/ProjectWorkTaskStatus'
    KnowledgeID:
      name: knowledge_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    KnowledgeScope:
      name: scope
      in: query
      schema:
        $ref: '#/components/schemas/ProjectKnowledgeScope'
    KnowledgeState:
      name: state
      in: query
      schema:
        $ref: '#/components/schemas/ProjectKnowledgeState'
    IntegrationProvider:
      name: provider
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/IntegrationProvider'
    IntegrationMaxChunks:
      name: max_chunks
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 20
    IntegrationMaxChunkBytes:
      name: max_chunk_bytes
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 8192
    IntegrationChunkOffset:
      name: chunk_offset
      in: query
      schema:
        type: integer
        minimum: 0
  headers:
    NoStore:
      description: Responses are metadata-only and are not intended for intermediary caching.
      schema:
        type: string
        enum: [no-store]
  requestBodies:
    ProjectWorkTaskAction:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectWorkTaskActionRequest'
    ProjectWorkTaskAttachment:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AttachProjectWorkTaskRefRequest'
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource already exists or transition conflicts with current metadata state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Runtime dependency unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Request content type must be application/json
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    Task:
      type: object
      additionalProperties: false
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchRunRequest:
      type: object
      additionalProperties: false
      required: [task_id, goal_summary]
      properties:
        task_id:
          type: string
          minLength: 1
        goal_summary:
          type: string
          minLength: 1
          maxLength: 500
          description: Redacted goal summary only; raw prompts, source content, PII, and provider payloads are prohibited.
    ResearchRun:
      type: object
      additionalProperties: false
      required: [id, task_id, goal_summary, status, created_at, updated_at]
      properties:
        id:
          type: string
        task_id:
          type: string
        goal_summary:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchSourceRequest:
      type: object
      additionalProperties: false
      required: [artifact_ref, source_type, summary]
      properties:
        artifact_ref:
          type: string
          minLength: 1
          description: URL or artifact reference; sensitive query values are redacted before storage.
        source_type:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
          description: Summary is redacted before storage; raw source content is not accepted.
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    ResearchSource:
      type: object
      additionalProperties: false
      required: [id, research_run_id, artifact_ref, source_type, summary, content_hash, retrieved_at, policy_metadata]
      properties:
        id:
          type: string
        research_run_id:
          type: string
        artifact_ref:
          type: string
        source_type:
          type: string
        summary:
          type: string
        content_hash:
          type: string
        retrieved_at:
          type: string
          format: date-time
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    CreateAgentRunRequest:
      type: object
      additionalProperties: false
      required: [project_id]
      properties:
        project_id:
          type: string
          minLength: 1
        trace_id:
          type: string
          description: Optional safe correlation id. Defaults to the generated run id.
        task_id:
          type: string
        summary:
          type: string
          description: Redacted summary only; raw prompts, completions, source, stderr, secrets, provider payloads, and PII are prohibited.
        changed_files:
          type: array
          items:
            type: string
            description: Safe project-relative path only.
        verifiers:
          type: array
          items:
            $ref: '#/components/schemas/AgentVerifier'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/AgentArtifact'
    AppendAgentStepRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        run_id:
          type: string
          description: Optional body alias; path id is authoritative for REST.
        trace_id:
          type: string
          description: Optional safe correlation id. Defaults to the parent run trace id.
        tool_name:
          type: string
        tool_category:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        failure_category:
          type: string
        notes:
          type: string
        changed_files:
          type: array
          items:
            type: string
        verifiers:
          type: array
          items:
            $ref: '#/components/schemas/AgentVerifier'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/AgentArtifact'
    CompleteAgentRunRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        run_id:
          type: string
          description: Optional body alias; path id is authoritative for REST.
        status:
          type: string
          enum: [completed, failed]
        failure_category:
          type: string
        summary:
          type: string
        changed_files:
          type: array
          items:
            type: string
        verifiers:
          type: array
          items:
            $ref: '#/components/schemas/AgentVerifier'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/AgentArtifact'
    PromoteAgentArtifactRequest:
      type: object
      additionalProperties: false
      required: [artifact_ref, state, source_ref]
      properties:
        run_id:
          type: string
          description: Optional body alias; path id is authoritative for REST.
        artifact_ref:
          type: string
          minLength: 1
          description: Existing run or step artifact ref. Absolute roots and traversal are rejected.
        artifact_kind:
          type: string
        state:
          type: string
          enum: [candidate, validated, promoted, rejected]
        source_ref:
          type: string
          minLength: 1
          description: Safe runtime source ref for the evidence decision.
        verifier_ref:
          type: string
          description: Required for validated, promoted, and rejected decisions.
        decision:
          type: string
          maxLength: 500
          description: Required for validated, promoted, and rejected decisions; raw source, prompts, stderr, secrets, provider payloads, and PII are prohibited.
    AgentRun:
      type: object
      additionalProperties: false
      required: [id, project_id, status, started_at]
      properties:
        id:
          type: string
        trace_id:
          type: string
        project_id:
          type: string
        task_id:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        failure_category:
          type: string
        summary:
          type: string
        changed_files:
          type: array
          items:
            type: string
        verifiers:
          type: array
          items:
            $ref: '#/components/schemas/AgentVerifier'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/AgentArtifact'
        promotions:
          type: array
          items:
            $ref: '#/components/schemas/AgentPromotion'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AgentStep'
      description: Metadata only; raw prompts, completions, source dumps, raw stderr, secrets, credentials, provider payloads, absolute roots, and PII are prohibited.
    AgentStep:
      type: object
      additionalProperties: false
      required: [id, status, started_at]
      properties:
        id:
          type: string
        trace_id:
          type: string
        tool_name:
          type: string
        tool_category:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        failure_category:
          type: string
        notes:
          type: string
        changed_files:
          type: array
          items:
            type: string
        verifiers:
          type: array
          items:
            $ref: '#/components/schemas/AgentVerifier'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/AgentArtifact'
    AgentVerifier:
      type: object
      additionalProperties: false
