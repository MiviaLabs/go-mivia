openapi: 3.1.0
info:
  title: MiviaLabs Agent Control API
  version: 0.1.0
  description: Localhost-only bootstrap REST contract for task and research-run metadata.
servers:
  - url: http://127.0.0.1:8080/api/v1
paths:
  /tasks:
    post:
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs:
    post:
      operationId: createResearchRun
      summary: Create research run metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchRunRequest'
      responses:
        '201':
          description: Created research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}:
    get:
      operationId: getResearchRun
      summary: Get research run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs/{id}/sources:
    post:
      operationId: createResearchSource
      summary: Create redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchSourceRequest'
      responses:
        '201':
          description: Created research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}/sources/{source_id}:
    get:
      operationId: getResearchSource
      summary: Get redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: source_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects:
    get:
      operationId: listProjects
      summary: List configured local projects
      responses:
        '200':
          description: Configured local project metadata without root paths
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
  /projects/{id}:
    get:
      operationId: getProject
      summary: Get configured local project metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Project metadata without root path exposure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/digest-runs:
    post:
      operationId: createProjectDigestRun
      summary: Run a manual metadata-only project digest
      description: Stores project/file metadata and metadata fingerprints only; raw source content and file-content hashes are not stored or returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '201':
          description: Created metadata-only project digest run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDigestRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    Task:
      type: object
      additionalProperties: false
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchRunRequest:
      type: object
      additionalProperties: false
      required: [task_id, goal_summary]
      properties:
        task_id:
          type: string
          minLength: 1
        goal_summary:
          type: string
          minLength: 1
          maxLength: 500
          description: Redacted goal summary only; raw prompts, source content, PII, and provider payloads are prohibited.
    ResearchRun:
      type: object
      additionalProperties: false
      required: [id, task_id, goal_summary, status, created_at, updated_at]
      properties:
        id:
          type: string
        task_id:
          type: string
        goal_summary:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchSourceRequest:
      type: object
      additionalProperties: false
      required: [artifact_ref, source_type, summary]
      properties:
        artifact_ref:
          type: string
          minLength: 1
          description: URL or artifact reference; sensitive query values are redacted before storage.
        source_type:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
          description: Summary is redacted before storage; raw source content is not accepted.
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    ResearchSource:
      type: object
      additionalProperties: false
      required: [id, research_run_id, artifact_ref, source_type, summary, content_hash, retrieved_at, policy_metadata]
      properties:
        id:
          type: string
        research_run_id:
          type: string
        artifact_ref:
          type: string
        source_type:
          type: string
        summary:
          type: string
        content_hash:
          type: string
        retrieved_at:
          type: string
          format: date-time
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    ProjectList:
      type: object
      additionalProperties: false
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    Project:
      type: object
      additionalProperties: false
      required: [id, display_name, enabled, classification, graph_namespace, digest_mode, update_policy, validation_status]
      properties:
        id:
          type: string
        display_name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        classification:
          type: string
        graph_namespace:
          type: string
        digest_mode:
          type: string
          enum: [metadata_only]
        update_policy:
          type: string
          enum: [manual]
        validation_status:
          type: string
        validation_error:
          type: string
      description: Project metadata response intentionally omits local root paths, include/exclude patterns, raw source content, and file-content hashes.
    ProjectDigestRun:
      type: object
      additionalProperties: false
      required: [id, project_id, graph_namespace, status, files_scanned, files_stored, files_skipped, started_at, completed_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        graph_namespace:
          type: string
        status:
          type: string
          enum: [completed, failed]
        files_scanned:
          type: integer
          minimum: 0
        files_stored:
          type: integer
          minimum: 0
        files_skipped:
          type: integer
          minimum: 0
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      description: Digest run metadata only; raw source content and file-content hashes are not stored or returned.
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
