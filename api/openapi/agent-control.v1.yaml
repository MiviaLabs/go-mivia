openapi: 3.1.0
info:
  title: MiviaLabs Agent Control API
  version: 0.1.0
  description: Localhost-only bootstrap REST contract for task, research-run, project context, reliability, and redacted agent-run metadata.
x-work-plan-task-contract:
  implementation_status: implemented_guarded_surface
  purpose: Governed multi-step work should be represented as project-scoped Work Plans and Work Tasks that link context health, context packs, Evidence Graph refs, Confidence Engine assessments, verifier result refs, Agent Activity, AgentRun refs, and Knowledge Promotion candidate refs.
  availability_rule: Verify the running OpenAPI/runtime surface before calling Work Plan or Work Task routes.
  safety_rule: Work Plan and Work Task metadata must not store raw prompts, completions, source dumps, raw stderr, provider payloads, secrets, roots, external URLs, skipped sensitive content, or PII.
x-project-automation-contract:
  implementation_status: implemented_guarded_surface
  purpose: Project Automation executes or queues Codex CLI work over existing ready Work Tasks; it is not an alternate planning system.
  runner_execution_modes:
    in_process: mivia-server executes Codex CLI from the server runtime.
    external: mivia-server queues codex_cli runs; mivia-automation-runner claims and executes them from the user's logged-in local Codex environment.
  verifier_rule: A successful Codex CLI exit leaves the run verifier-required and does not complete a Work Task or promote knowledge.
  safety_rule: Automation metadata must not store raw prompts, completions, source dumps, raw stderr, provider payloads, secrets, roots, external URLs, skipped sensitive content, or PII.
servers:
  - url: http://127.0.0.1:8080/api/v1
paths:
  /tasks:
    post:
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs:
    post:
      operationId: createResearchRun
      summary: Create research run metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchRunRequest'
      responses:
        '201':
          description: Created research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}:
    get:
      operationId: getResearchRun
      summary: Get research run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs/{id}/sources:
    post:
      operationId: createResearchSource
      summary: Create redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchSourceRequest'
      responses:
        '201':
          description: Created research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}/sources/{source_id}:
    get:
      operationId: getResearchSource
      summary: Get redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: source_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '404':
          $ref: '#/components/responses/NotFound'
  /agent-runs:
    post:
      operationId: createAgentRun
      summary: Create redacted agent run metadata
      description: Stores metadata only. Raw prompts, completions, source dumps, raw stderr, secrets, credentials, provider payloads, absolute roots, and PII are prohibited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRunRequest'
      responses:
        '201':
          description: Created redacted agent run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
        '400':
          $ref: '#/components/responses/BadRequest'
  /agent-runs/{id}:
    get:
      operationId: getAgentRun
      summary: Get redacted agent run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Redacted agent run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /agent-runs/{id}/steps:
    post:
      operationId: appendAgentRunStep
      summary: Append redacted agent run step metadata
      description: Appends one metadata-only step. Raw tool payloads, prompts, completions, source dumps, raw stderr, secrets, credentials, absolute roots, and PII are prohibited.
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendAgentStepRequest'
      responses:
        '200':
          description: Updated redacted agent run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /agent-runs/{id}/promotions:
    post:
      operationId: promoteAgentArtifact
      summary: Record agent artifact promotion-gate decision
      description: Records metadata-only promotion vocabulary for an existing agent-run artifact. Stores refs, state, verifier ref, and bounded decision text only; raw prompts, source dumps, raw stderr, roots, secrets, provider payloads, and PII are prohibited.
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteAgentArtifactRequest'
      responses:
        '200':
          description: Updated redacted agent run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /agent-runs/{id}/complete:
    post:
      operationId: completeAgentRun
      summary: Complete redacted agent run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteAgentRunRequest'
      responses:
        '200':
          description: Completed redacted agent run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects:
    get:
      operationId: listProjects
      summary: List configured local projects
      responses:
        '200':
          description: Configured local project metadata without root paths
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
  /projects/{id}:
    get:
      operationId: getProject
      summary: Get configured local project metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Project metadata without root path exposure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/digest-runs:
    post:
      operationId: createProjectDigestRun
      summary: Run a manual metadata-only project digest
      description: Stores project/file metadata and metadata fingerprints only; raw source content and file-content hashes are not stored or returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '201':
          description: Created metadata-only project digest run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDigestRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/context-health:
    get:
      operationId: getProjectContextHealth
      summary: Get project context health
      description: Returns deterministic project context readiness and freshness metadata without roots, source text, skipped sensitive content, raw errors, prompts, provider payloads, secrets, or PII.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Project context health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextHealth'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/dashboard-summary:
    get:
      operationId: getProjectDashboardSummary
      summary: Get bounded project dashboard summary
      description: Returns one bounded aggregate for dashboard rendering, including project metadata, context health, latest ingestion metadata, graph statistics, AST coverage, workspace git status summary, and integration status/counts when available. Symbol concentration aggregates all indexed symbols for each applicable bucket, while the sample array remains bounded for display. `concentration_basis.denominator_count` is the exact denominator for the selected primary bucket, such as indexed JS/TS module symbols, indexed C# namespace symbols, indexed Unity C# symbols, indexed symbols with package metadata, or all indexed symbols for code-area fallback. It exposes semantic buckets when reliable (`by_module` for JavaScript/TypeScript source-file modules, `by_namespace` for C# symbols carrying parsed namespace metadata, `by_assembly` for Unity symbols grouped by nearest parsed `.asmdef` or documented predefined assembly rules, and `by_package` for parsed package metadata) plus explicit `by_code_area` / `by_path_bucket` path buckets. Path buckets must not be interpreted as language modules, Go modules, TypeScript modules, C# namespaces, or Unity assemblies. It omits roots, source text, raw diffs, provider payloads, secrets, and PII.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Bounded dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDashboardSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/agent-activity/stream:
    get:
      operationId: streamProjectAgentActivity
      summary: Stream project-scoped agent activity
      description: Streams recent persisted redacted MCP activity, agent-run lifecycle events, verifier metadata, promotion decisions, policy guard events, and live in-memory events for one local project as server-sent events. Events can include trace_id, run_id, parent_id, and correlation_kind. Persistent storage includes metadata plus input/output summary classes and omits raw payloads and payload-derived hashes by default. Full raw request, params, argument, result payloads, and payload hashes may be present for live local debugging or when explicit local debug retention is enabled with MIVIA_DEBUG_ENABLED and MIVIA_AGENT_ACTIVITY_RETAIN_RAW_PAYLOADS.
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: recent
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 500
        - name: after_id
          in: query
          required: false
          description: Replay events with IDs greater than this cursor. Equivalent to the SSE Last-Event-ID header.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Server-sent MCP activity stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /projects/{id}/impact/analyze:
    post:
      operationId: analyzeProjectImpact
      summary: Analyze changed-path impact
      description: Deterministic local impact analysis from changed paths or governed workspace diff metadata, including graph-backed references, callers, and implementer edges. It does not return raw diff content.
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpactAnalysisRequest'
      responses:
        '200':
          description: Impact analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactAnalysis'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /projects/{id}/context-pack:
    post:
      operationId: buildProjectContextPack
      summary: Build bounded project context pack
      description: Composes bounded text search hits, file metadata, symbol metadata, optional impact metadata, and manifest-only reproducibility metadata from existing local indexed context. It creates no new storage and returns no roots, raw diffs, external provider data, uncapped chunk source, or full source by default.
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextPackBuildRequest'
      responses:
        '200':
          description: Bounded project context pack
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextPack'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /projects/{id}/claims/check:
    post:
      operationId: checkProjectClaims
      summary: Check stale documentation claims
      description: Deterministic claim check for selected stable docs/contracts and registered REST/MCP names. It does not use LLM judgment or broad crawling.
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimCheckRequest'
      responses:
        '200':
          description: Claim check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimCheckResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/work-plans:
    post:
      operationId: createProjectWorkPlan
      summary: Create project Work Plan
      description: Creates one project-scoped metadata-only Work Plan. Raw prompts, completions, source dumps, raw stderr, provider payloads, secrets, roots, external URLs, skipped sensitive content, and PII are prohibited.
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectWorkPlanRequest'
      responses:
        '201':
          description: Created Work Plan
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
    get:
      operationId: listProjectWorkPlans
      summary: List project Work Plans
      description: Lists project-scoped Work Plan metadata with bounded pagination and safe metadata filters.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/WorkPlanStatusQuery'
        - $ref: '#/components/parameters/OwnerAgentQuery'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Work Plans
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkPlanList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/work-plans/{plan_id}:
    get:
      operationId: getProjectWorkPlan
      summary: Get project Work Plan
      description: Returns one project-scoped Work Plan metadata record.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanID'
      responses:
        '200':
          description: Work Plan
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkPlan'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/work-plans/{plan_id}/status:
    post:
      operationId: updateProjectWorkPlanStatus
      summary: Update project Work Plan status
      description: Updates Work Plan status and resume metadata without storing raw prompts, completions, source dumps, raw stderr, provider payloads, secrets, roots, external URLs, or PII.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectWorkPlanStatusRequest'
      responses:
        '200':
          description: Updated Work Plan
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /projects/{id}/work-plans/{plan_id}/resume:
    get:
      operationId: resumeProjectWorkPlan
      summary: Resume project Work Plan
      description: Returns metadata needed to resume a Work Plan, including safe task refs, dependency summaries, context refs, and verification requirements.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanID'
      responses:
        '200':
          description: Work Plan resume metadata
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkPlan'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/work-plans/{plan_id}/tasks:
    post:
      operationId: createProjectWorkTask
      summary: Create project Work Task
      description: Creates one isolated-worker-ready project Work Task under a Work Plan. Tasks are metadata-only and must include bounded scope, dependencies, evidence needs, context refs, verification requirement, and resume instructions. Each task must be executable by a low-intelligence worker from task metadata and attached refs alone, without prior chat memory or hidden orchestrator context; verification must be written for independent orchestrator execution.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectWorkTaskRequest'
      responses:
        '201':
          description: Created Work Task
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTask'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /projects/{id}/work-tasks:
    get:
      operationId: listProjectWorkTasks
      summary: List project Work Tasks
      description: Lists project-scoped Work Task metadata with bounded pagination and safe metadata filters.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanIDQuery'
        - $ref: '#/components/parameters/WorkTaskStatusQuery'
        - $ref: '#/components/parameters/OwnerAgentQuery'
        - $ref: '#/components/parameters/ClaimedByRunIDQuery'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Work Tasks
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTaskList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/work-tasks/open:
    get:
      operationId: listOpenProjectWorkTasks
      summary: List open project Work Tasks
      description: Lists ready, claimed, in-progress, blocked, needs-review, verifying, and planned Work Tasks according to the service's open-task rules.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanIDQuery'
        - $ref: '#/components/parameters/WorkTaskStatusQuery'
        - $ref: '#/components/parameters/OwnerAgentQuery'
        - $ref: '#/components/parameters/ClaimedByRunIDQuery'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Open Work Tasks
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTaskList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/work-tasks/mine:
    get:
      operationId: listMyProjectWorkTasks
      summary: List Work Tasks claimed by the current run
      description: Lists project Work Tasks filtered by claimed_by_run_id or run_id.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanIDQuery'
        - $ref: '#/components/parameters/WorkTaskStatusQuery'
        - $ref: '#/components/parameters/OwnerAgentQuery'
        - $ref: '#/components/parameters/ClaimedByRunIDQuery'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Claimed Work Tasks
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTaskList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/work-tasks/blocked:
    get:
      operationId: listBlockedProjectWorkTasks
      summary: List blocked project Work Tasks
      description: Lists blocked project-scoped Work Task metadata.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanIDQuery'
        - $ref: '#/components/parameters/OwnerAgentQuery'
        - $ref: '#/components/parameters/ClaimedByRunIDQuery'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Blocked Work Tasks
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTaskList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/work-tasks/next:
    get:
      operationId: getNextProjectWorkTask
      summary: Get next project Work Task
      description: Selects the next claimable Work Task using safe metadata, dependency readiness, context refs, and verification requirements.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PlanIDQuery'
        - $ref: '#/components/parameters/OwnerAgentQuery'
        - name: run_id
          in: query
          schema:
            type: string
            maxLength: 200
        - name: trace_id
          in: query
          schema:
            type: string
            maxLength: 200
        - name: include_claimed_by_me
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Next Work Task selection
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTaskNext'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{id}/work-tasks/{task_id}:
    get:
      operationId: getProjectWorkTask
      summary: Get project Work Task
      description: Returns one project-scoped Work Task metadata record.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/TaskID'
      responses:
        '200':
          description: Work Task
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTask'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/work-tasks/{task_id}/claim:
    post:
      operationId: claimProjectWorkTask
      summary: Claim project Work Task
      description: Claims one Work Task for a run using metadata-only refs.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/TaskID'
      requestBody:
        $ref: '#/components/requestBodies/ProjectWorkTaskAction'
      responses:
        '200':
          description: Claimed Work Task
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWorkTask'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /projects/{id}/work-tasks/{task_id}/release:
    post:
      operationId: releaseProjectWorkTask
      summary: Release project Work Task
