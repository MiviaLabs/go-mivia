openapi: 3.1.0
info:
  title: MiviaLabs Agent Control API
  version: 0.1.0
  description: Localhost-only bootstrap REST contract for task and research-run metadata.
servers:
  - url: http://127.0.0.1:8080/api/v1
paths:
  /tasks:
    post:
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs:
    post:
      operationId: createResearchRun
      summary: Create research run metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchRunRequest'
      responses:
        '201':
          description: Created research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}:
    get:
      operationId: getResearchRun
      summary: Get research run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs/{id}/sources:
    post:
      operationId: createResearchSource
      summary: Create redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchSourceRequest'
      responses:
        '201':
          description: Created research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}/sources/{source_id}:
    get:
      operationId: getResearchSource
      summary: Get redacted research source metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: source_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Research source metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchSource'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects:
    get:
      operationId: listProjects
      summary: List configured local projects
      responses:
        '200':
          description: Configured local project metadata without root paths
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
  /projects/{id}:
    get:
      operationId: getProject
      summary: Get configured local project metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Project metadata without root path exposure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/digest-runs:
    post:
      operationId: createProjectDigestRun
      summary: Run a manual metadata-only project digest
      description: Stores project/file metadata and metadata fingerprints only; raw source content and file-content hashes are not stored or returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '201':
          description: Created metadata-only project digest run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDigestRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/ingestion-runs:
    post:
      operationId: createProjectIngestionRun
      summary: Run manual content graph ingestion
      description: Runs bounded localhost-only ingestion for an opted-in content_graph project. Raw DB queries, absolute roots, skipped sensitive content, secrets, PII, raw prompts, and provider payloads are not returned.
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '201':
          description: Created ingestion run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIngestionRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/ingestion-runs/{run_id}:
    get:
      operationId: getProjectIngestionRun
      summary: Get manual content graph ingestion run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/RunID'
      responses:
        '200':
          description: Ingestion run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectIngestionRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/files:
    get:
      operationId: listProjectFiles
      summary: List project ingestion file metadata
      description: Returns bounded file metadata only. Sensitive skips omit relative paths and content hashes.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: status
          in: query
          schema:
            type: string
            enum: [eligible, skipped, absent]
      responses:
        '200':
          description: Project files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFileList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/files/{file_id}/chunks:
    get:
      operationId: listProjectFileChunks
      summary: List bounded project file chunks
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/FileID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: max_chunk_bytes
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Project file chunks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectChunkList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{id}/symbols:
    get:
      operationId: listProjectSymbols
      summary: List project symbol metadata
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Project symbols
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSymbolList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    FileID:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stable opaque file id; never an absolute path.
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    PageToken:
      name: page_token
      in: query
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    Task:
      type: object
      additionalProperties: false
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchRunRequest:
      type: object
      additionalProperties: false
      required: [task_id, goal_summary]
      properties:
        task_id:
          type: string
          minLength: 1
        goal_summary:
          type: string
          minLength: 1
          maxLength: 500
          description: Redacted goal summary only; raw prompts, source content, PII, and provider payloads are prohibited.
    ResearchRun:
      type: object
      additionalProperties: false
      required: [id, task_id, goal_summary, status, created_at, updated_at]
      properties:
        id:
          type: string
        task_id:
          type: string
        goal_summary:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchSourceRequest:
      type: object
      additionalProperties: false
      required: [artifact_ref, source_type, summary]
      properties:
        artifact_ref:
          type: string
          minLength: 1
          description: URL or artifact reference; sensitive query values are redacted before storage.
        source_type:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
          description: Summary is redacted before storage; raw source content is not accepted.
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    ResearchSource:
      type: object
      additionalProperties: false
      required: [id, research_run_id, artifact_ref, source_type, summary, content_hash, retrieved_at, policy_metadata]
      properties:
        id:
          type: string
        research_run_id:
          type: string
        artifact_ref:
          type: string
        source_type:
          type: string
        summary:
          type: string
        content_hash:
          type: string
        retrieved_at:
          type: string
          format: date-time
        policy_metadata:
          type: object
          additionalProperties:
            type: string
    ProjectList:
      type: object
      additionalProperties: false
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    Project:
      type: object
      additionalProperties: false
      required: [id, display_name, enabled, classification, graph_namespace, digest_mode, update_policy, validation_status]
      properties:
        id:
          type: string
        display_name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        classification:
          type: string
        graph_namespace:
          type: string
        digest_mode:
          type: string
          enum: [metadata_only, content_graph]
        update_policy:
          type: string
          enum: [manual, live]
        validation_status:
          type: string
        validation_error:
          type: string
      description: Project metadata response intentionally omits local root paths, include/exclude patterns, raw source content, and file-content hashes.
    ProjectDigestRun:
      type: object
      additionalProperties: false
      required: [id, project_id, graph_namespace, status, files_scanned, files_stored, files_skipped, started_at, completed_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        graph_namespace:
          type: string
        status:
          type: string
          enum: [completed, failed]
        files_scanned:
          type: integer
          minimum: 0
        files_stored:
          type: integer
          minimum: 0
        files_skipped:
          type: integer
          minimum: 0
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      description: Digest run metadata only; raw source content and file-content hashes are not stored or returned.
    ProjectIngestionRun:
      type: object
      additionalProperties: false
      required: [id, project_id, trigger, mode, status, files_seen, files_ingested, files_skipped, chunks_stored, symbols_stored, started_at, finished_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        trigger:
          type: string
          enum: [manual, live]
        mode:
          type: string
          enum: [content_graph]
        status:
          type: string
          enum: [pending, running, completed, failed]
        files_seen:
          type: integer
          minimum: 0
        files_ingested:
          type: integer
          minimum: 0
        files_skipped:
          type: integer
          minimum: 0
        chunks_stored:
          type: integer
          minimum: 0
        symbols_stored:
          type: integer
          minimum: 0
        error_category:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
    ProjectFileList:
      type: object
      additionalProperties: false
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/ProjectFile'
        next_page_token:
          type: string
    ProjectFile:
      type: object
      additionalProperties: false
      required: [id, project_id, status, present, size_bytes, modified_at, relative_path_safe]
      properties:
        id:
          type: string
          description: Stable opaque file id; never an absolute path.
        project_id:
          type: string
        relative_path:
          type: string
          description: Root-relative path for safe eligible files only.
        status:
          type: string
          enum: [eligible, skipped, absent]
        present:
          type: boolean
        size_bytes:
          type: integer
          minimum: 0
        modified_at:
          type: string
          format: date-time
        skipped_reason:
          type: string
        relative_path_safe:
          type: boolean
      description: Does not include absolute roots, source-content hashes, skipped sensitive content, or matched sensitive text.
    ProjectChunkList:
      type: object
      additionalProperties: false
      required: [chunks]
      properties:
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/ProjectChunk'
        next_page_token:
          type: string
    ProjectChunk:
      type: object
      additionalProperties: false
      required: [id, file_id, project_id, index, start_line, end_line, byte_start, byte_end, text, text_truncated]
      properties:
        id:
          type: string
        file_id:
          type: string
        project_id:
          type: string
        index:
          type: integer
          minimum: 0
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
        byte_start:
          type: integer
          minimum: 0
        byte_end:
          type: integer
          minimum: 0
        text:
          type: string
          description: Bounded eligible chunk text only; never skipped sensitive content.
        text_truncated:
          type: boolean
    ProjectSymbolList:
      type: object
      additionalProperties: false
      required: [symbols]
      properties:
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSymbol'
        next_page_token:
          type: string
    ProjectSymbol:
      type: object
      additionalProperties: false
      required: [id, file_id, project_id, kind, name, start_line, end_line]
      properties:
        id:
          type: string
        file_id:
          type: string
        project_id:
          type: string
        kind:
          type: string
        name:
          type: string
        package:
          type: string
        import_path:
          type: string
        receiver:
          type: string
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
