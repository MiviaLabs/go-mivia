            $ref: '#/components/schemas/ProjectHeading'
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSymbol'
        symbols_next_page_token:
          type: string
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/ProjectOutlineChunk'
      description: Chunk text is omitted unless requested with include_chunk_text. Raw AST node text, absolute roots, skipped sensitive content, and matched sensitive text are never returned.
    ProjectHeading:
      type: object
      additionalProperties: false
      required: [id, file_id, project_id, level, text, parent_index, start_line, end_line]
      properties:
        id:
          type: string
        file_id:
          type: string
        project_id:
          type: string
        level:
          type: integer
          minimum: 1
        text:
          type: string
        parent_index:
          type: integer
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
    ProjectOutlineChunk:
      type: object
      additionalProperties: false
      required: [id, file_id, project_id, index, start_line, end_line, byte_start, byte_end]
      properties:
        id:
          type: string
        file_id:
          type: string
        project_id:
          type: string
        index:
          type: integer
          minimum: 0
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
        byte_start:
          type: integer
          minimum: 0
        byte_end:
          type: integer
          minimum: 0
        text:
          type: string
          description: Optional eligible chunk text, included only when requested and capped by max_chunk_bytes and project limits.
        text_truncated:
          type: boolean
    ProjectSymbolList:
      type: object
      additionalProperties: false
      required: [symbols]
      properties:
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSymbol'
        next_page_token:
          type: string
        index:
          $ref: '#/components/schemas/ProjectSearchIndex'
    ProjectTextSearchResultList:
      type: object
      additionalProperties: false
      required: [results, max_snippet_bytes]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ProjectTextSearchResult'
        next_page_token:
          type: string
        max_snippet_bytes:
          type: integer
          minimum: 1
        index:
          $ref: '#/components/schemas/ProjectSearchIndex'
    ProjectTextSearchResult:
      type: object
      additionalProperties: false
      required: [file, chunk, line_start, line_end, byte_start, byte_end, snippet, snippet_truncated]
      properties:
        file:
          $ref: '#/components/schemas/ProjectFile'
        chunk:
          $ref: '#/components/schemas/ProjectChunk'
        line_start: {type: integer, minimum: 1}
        line_end: {type: integer, minimum: 1}
        byte_start: {type: integer, minimum: 0}
        byte_end: {type: integer, minimum: 0}
        snippet:
          type: string
          description: Capped eligible indexed source snippet only.
        snippet_truncated:
          type: boolean
    ProjectASTSearchResultList:
      type: object
      additionalProperties: false
      required: [results, query_language, query_version, result_truncated, max_snippet_bytes]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ProjectASTSearchResult'
        next_page_token:
          type: string
        query_language:
          type: string
        query_version:
          type: string
        result_truncated:
          type: boolean
        max_snippet_bytes:
          type: integer
          minimum: 1
        coverage:
          $ref: '#/components/schemas/ProjectASTCoverage'
          description: Safe coverage-gap metadata only. It does not expose source text, paths for sensitive skips, content hashes, or parser internals.
        index:
          $ref: '#/components/schemas/ProjectSearchIndex'
    ProjectASTQueryCatalog:
      type: object
      additionalProperties: false
      required: [queries]
      properties:
        queries:
          type: array
          items:
            $ref: '#/components/schemas/ProjectASTQuery'
        coverage:
          type: array
          description: Safe per-language coverage-gap metadata only. It does not expose source text, paths for sensitive skips, content hashes, or parser internals.
          items:
            $ref: '#/components/schemas/ProjectASTCoverage'
        index:
          $ref: '#/components/schemas/ProjectSearchIndex'
    ProjectASTQuery:
      type: object
      additionalProperties: false
      required: [id, language, version, captures, extensions]
      properties:
        id:
          type: string
          description: Named query id. This is not raw Tree-sitter query syntax.
        language:
          type: string
          enum: [go, python, javascript, jsx, typescript, tsx, csharp, dart]
        version:
          type: string
        captures:
          type: array
          items: {type: string}
        extensions:
          type: array
          items: {type: string}
    ProjectASTCoverage:
      type: object
      additionalProperties: false
      required: [language, extensions, coverage_scope, eligible_files, skipped_file_too_large, coverage_status]
      properties:
        language:
          type: string
        extensions:
          type: array
          items: {type: string}
        coverage_scope:
          type: string
          enum: [file_too_large]
          description: Scope of the coverage gap counters; this does not mean complete semantic coverage for every possible skip reason.
        eligible_files:
          type: integer
          minimum: 0
        skipped_file_too_large:
          type: integer
          minimum: 0
          description: Count of oversized skipped files in this language coverage set. File paths and source are not returned.
        coverage_status:
          type: string
          enum: [complete, partial]
        coverage_partial_cause:
          type: string
          enum: [file_too_large]
    ProjectASTSearchResult:
      type: object
      additionalProperties: false
      required: [file, chunk, capture_name, line_start, line_end, byte_start, byte_end]
      properties:
        file:
          $ref: '#/components/schemas/ProjectFile'
        chunk:
          $ref: '#/components/schemas/ProjectChunk'
        capture_name:
          type: string
        capture_text:
          type: string
          description: Capped eligible capture text only.
        capture_text_truncated:
          type: boolean
        line_start: {type: integer, minimum: 1}
        line_end: {type: integer, minimum: 1}
        byte_start: {type: integer, minimum: 0}
        byte_end: {type: integer, minimum: 0}
        start_column: {type: integer, minimum: 0}
        end_column: {type: integer, minimum: 0}
        snippet:
          type: string
          description: Capped eligible indexed source snippet only.
        snippet_truncated:
          type: boolean
    ProjectSearchIndex:
      type: object
      additionalProperties: false
      properties:
        index_status:
          type: string
          enum: [completed, running, failed, pending, unknown]
        ingestion_run_id:
          type: string
        degraded:
          type: boolean
          description: True when the local search index is known to require repair.
        degraded_reason:
          type: string
          description: Sanitized reason code when the local search index is degraded.
    ProjectSymbol:
      type: object
      additionalProperties: false
      required: [id, file_id, project_id, kind, name, start_line, end_line]
      properties:
        id:
          type: string
        file_id:
          type: string
        project_id:
          type: string
        kind:
          type: string
        name:
          type: string
        package:
          type: string
        import_path:
          type: string
        receiver:
          type: string
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
        start_byte:
          type: integer
          minimum: 0
        end_byte:
          type: integer
          minimum: 0
        start_column:
          type: integer
          minimum: 0
        end_column:
          type: integer
          minimum: 0
    ProjectSymbolSource:
      type: object
      additionalProperties: false
      required: [symbol, text, text_truncated, max_bytes]
      properties:
        symbol:
          $ref: '#/components/schemas/ProjectSymbol'
        text:
          type: string
          description: Eligible indexed symbol source text, capped by max_source_bytes and project limits.
        text_truncated:
          type: boolean
        max_bytes:
          type: integer
    ProjectSymbolReferenceList:
      type: object
      additionalProperties: false
      required: [symbol, references]
      properties:
        symbol:
          $ref: '#/components/schemas/ProjectSymbol'
        references:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSymbolReference'
        next_page_token:
          type: string
        index:
          $ref: '#/components/schemas/ProjectSearchIndex'
    ProjectSymbolReference:
      type: object
      additionalProperties: false
      required: [id, file_id, project_id, kind, name, start_line, end_line, resolution_status]
      properties:
        id: {type: string}
        file_id: {type: string}
        project_id: {type: string}
        kind: {type: string}
        name: {type: string}
        target_name: {type: string}
        target_symbol_id: {type: string}
        package: {type: string}
        receiver: {type: string}
        import_path: {type: string}
        enclosing_symbol_id: {type: string}
        enclosing_symbol_name: {type: string}
        start_line: {type: integer, minimum: 1}
        end_line: {type: integer, minimum: 1}
        start_byte: {type: integer, minimum: 0}
        end_byte: {type: integer, minimum: 0}
        start_column: {type: integer, minimum: 0}
        end_column: {type: integer, minimum: 0}
        resolution_status: {type: string}
        confidence: {type: string}
    ProjectSymbolCallEdgeList:
      type: object
      additionalProperties: false
      required: [symbol, edges]
      properties:
        symbol:
          $ref: '#/components/schemas/ProjectSymbol'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSymbolCallEdge'
        next_page_token:
          type: string
        index:
          $ref: '#/components/schemas/ProjectSearchIndex'
    ProjectSymbolCallEdge:
      type: object
      additionalProperties: false
      required: [id, project_id, caller_symbol_id, callee_symbol_id, resolution_status]
      properties:
        id: {type: string}
        call_id: {type: string}
        file_id: {type: string}
        project_id: {type: string}
        caller_symbol_id: {type: string}
        callee_symbol_id: {type: string}
        caller_name: {type: string}
        callee_name: {type: string}
        receiver: {type: string}
        import_path: {type: string}
        start_line: {type: integer, minimum: 1}
        end_line: {type: integer, minimum: 1}
        start_byte: {type: integer, minimum: 0}
