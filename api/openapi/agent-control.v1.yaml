          type: array
          items:
            type: string
        scope:
          type: string
        status:
          type: string
        exit_status:
          type: integer
    AgentArtifact:
      type: object
      additionalProperties: false
      required: [ref]
      properties:
        ref:
          type: string
        kind:
          type: string
    AgentPromotion:
      type: object
      additionalProperties: false
      required: [artifact_ref, state, source_ref, decided_at]
      properties:
        artifact_ref:
          type: string
        artifact_kind:
          type: string
        state:
          type: string
          enum: [candidate, validated, promoted, rejected]
        source_ref:
          type: string
        verifier_ref:
          type: string
        decision:
          type: string
        decided_at:
          type: string
          format: date-time
    ProjectList:
      type: object
      additionalProperties: false
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    Project:
      type: object
      additionalProperties: false
      required: [id, display_name, enabled, classification, graph_namespace, graph_storage, digest_mode, update_policy, workspace_mode, validation_status]
      properties:
        id:
          type: string
        aliases:
          type: array
          items:
