          $ref: '#/components/schemas/Project'
        context_health:
          $ref: '#/components/schemas/ContextHealth'
        latest_run:
          $ref: '#/components/schemas/ProjectIngestionRun'
        graph:
          type: object
          description: Bounded file, symbol, heading, AST coverage, and search-index metadata for dashboards. Symbol summaries include `total_count` for all indexed symbols, bounded display `sampled_count` / `sample`, semantic buckets (`by_module`, `by_namespace`, `by_assembly`, `by_package`) when reliable parsed metadata exists, and `by_code_area` / `by_path_bucket` for repository-relative path buckets over all indexed symbols. `concentration_basis` identifies which bucket is primary, what metadata source backs it, and the exact `denominator_count` for percentages. Path buckets are approximate code areas, not language-level module/package/namespace/assembly boundaries. It never contains source text or raw diff content.
        workspace:
          type: object
          description: Bounded workspace git status summary with counts and sampled relative paths only.
        integrations:
          type: object
          description: Safe integration provider status and indexed item counts when configured.
        limits:
          type: object
          additionalProperties:
            type: integer
        warnings:
          type: array
          items:
            type: string
        checked_at:
          type: string
          format: date-time
