openapi: 3.1.0
info:
  title: MiviaLabs Agent Control API
  version: 0.1.0
  description: Localhost-only bootstrap REST contract for task and research-run metadata.
servers:
  - url: http://127.0.0.1:8080/api/v1
paths:
  /tasks:
    post:
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
  /research-runs:
    post:
      operationId: createResearchRun
      summary: Create research run metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchRunRequest'
      responses:
        '201':
          description: Created research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '400':
          $ref: '#/components/responses/BadRequest'
  /research-runs/{id}:
    get:
      operationId: getResearchRun
      summary: Get research run metadata
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Research run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchRun'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    Task:
      type: object
      additionalProperties: false
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateResearchRunRequest:
      type: object
      additionalProperties: false
      required: [task_id, goal_summary]
      properties:
        task_id:
          type: string
          minLength: 1
        goal_summary:
          type: string
          minLength: 1
          maxLength: 500
          description: Redacted goal summary only; raw prompts, source content, PII, and provider payloads are prohibited.
    ResearchRun:
      type: object
      additionalProperties: false
      required: [id, task_id, goal_summary, status, created_at, updated_at]
      properties:
        id:
          type: string
        task_id:
          type: string
        goal_summary:
          type: string
        status:
          type: string
          enum: [pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
